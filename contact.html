<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Kselis</title>
    
    <link rel="icon" href="kselis_logo/kselis_logo_nobg_light.png" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&family=Cormorant+Infant:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        /* --- CORE STYLES & VARIABLES --- */
        :root {
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --text-main: #111111;
            --text-muted: #555555;
            --border-color: #eaeaea;
            --accent: #667eea;
            --accent-light: rgba(102, 126, 234, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Raleway', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-container img {
            height: 45px; 
            object-fit: contain;
        }

        .logo-text {
            font-family: 'Raleway', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--text-main); }

        /* --- MAIN CONTENT & FORM --- */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .contact-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 50px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.03);
        }

        .contact-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .contact-header .icon-circle {
            width: 60px;
            height: 60px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--text-main);
        }

        .contact-header h1 {
            font-family: 'Cormorant Infant', serif;
            font-size: 3rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .contact-header p {
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        /* --- FORM STYLES --- */
        form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 700;
            color: var(--text-muted);
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 15px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Raleway', sans-serif;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.2s ease;
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
            background: var(--card-bg);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        input::placeholder, textarea::placeholder {
            color: #aaa;
        }

        button[type="submit"] {
            background-color: var(--text-main);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Raleway', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: #333;
            transform: translateY(-2px);
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 30px 20px;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
        }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            .contact-container { padding: 40px 25px; border-radius: 0; border-left: none; border-right: none; }
            .contact-header h1 { font-size: 2.5rem; }
            nav { padding: 15px 20px; }
            .logo-text { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo-container">
            <img src="kselis_logo/kselis_logo_nobg_light.png" alt="Kselis Logo">
            <span class="logo-text">KSELIS</span>
        </a>
        <div class="nav-links">
            <a href="index.html">
                <span class="material-symbols-outlined" style="font-size: 20px;">arrow_back</span> Home
            </a>
        </div>
    </nav>

    <main>
        <div class="contact-container">
            <div class="contact-header">
                <div class="icon-circle">
                    <span class="material-symbols-outlined" style="font-size: 28px;">forward_to_inbox</span>
                </div>
                <h1>Get in Touch</h1>
                <p>Have a question or want to work together? Fill out the form below and we'll get back to you shortly.</p>
            </div>

            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){ window.location='success.html'; }"></iframe>

            <form id="kselisForm" action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSdawQ9R7LDjfJTKBWSz93LIz4iEB6e9as5Mhx6fFMiwr7I_mg/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true;">
                
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="entry.1325372576" placeholder="Rasputin" required>
                </div>
                
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="entry.490756582" placeholder="Rasputin@rocks.com" required>
                </div>
                
                <div class="input-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="entry.488481316" placeholder="How can we help you today?" required></textarea>
                </div>
                
                <button type="submit">
                    Send Message <span class="material-symbols-outlined" style="font-size: 20px;">send</span>
                </button>
            </form>
        </div>
    </main>

    <footer>
        &copy; 2024 Kselis Institute. All rights reserved | <a href="mailto:kselis.institute@gmail.com">Mail Us directly</a>
    </footer>

    <script>
        // Global variable to track if the form was submitted
        var submitted = false;

        const form = document.getElementById('kselisForm');

        form.addEventListener('submit', function() {
            // Change button to show loading state while the hidden iframe processes the submission
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.innerHTML = 'Sending... <span class="material-symbols-outlined" style="font-size: 20px;">hourglass_empty</span>';
            submitBtn.style.opacity = '0.8';
            submitBtn.style.pointerEvents = 'none';
        });
    </script>
</body>
</html>
