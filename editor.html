<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kselis Wiki Editor</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&family=Cormorant+Infant:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        /* --- CORE STYLES --- */
        body {
            font-family: 'Raleway', sans-serif;
            margin: 0;
            background-color: #fafafa;
            color: #333;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MINIMALIST SIDEBAR (Desktop) --- */
        .sidebar {
            width: 260px;
            background-color: #f4f4f4;
            border-right: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            box-sizing: border-box;
            z-index: 10;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .sidebar-header {
            font-family: 'Cormorant Infant', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 24px;
            padding: 0 8px;
            letter-spacing: 0.2px;
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #888;
            font-weight: 700;
            margin-bottom: 8px;
            padding: 0 8px;
        }

        /* Clean, flat buttons with soft hover */
        .tool-btn, .nav-link {
            background: transparent;
            border: none;
            width: 100%;
            text-align: left;
            padding: 10px 12px;
            border-radius: 6px;
            font-family: 'Raleway', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: #444;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s, color 0.2s;
            text-decoration: none;
        }

        .tool-btn:hover, .nav-link:hover {
            background-color: #e8e8e8;
            color: #111;
        }

        /* Icon Styling */
        .material-symbols-outlined {
            font-size: 20px; /* Perfectly sized to match the 0.9rem text */
            color: #666;
            transition: color 0.2s;
        }

        .tool-btn:hover .material-symbols-outlined, 
        .nav-link:hover .material-symbols-outlined {
            color: #111;
        }

        select.tool-btn {
            appearance: none;
            border: 1px solid #ddd;
            background: #fff;
            margin-bottom: 10px;
            padding: 10px 12px;
        }

        select.tool-btn:hover {
            background: #fafafa;
        }

        .divider {
            height: 1px;
            background-color: #eaeaea;
            margin: 16px 8px;
        }

        .export-btn {
            background-color: #222;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Raleway', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: auto;
            text-align: center;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .export-btn:hover {
            background-color: #444;
        }

        .export-btn .material-symbols-outlined {
            color: #fff;
        }

        /* --- THE EDITOR "PAPER" CANVAS --- */
        .editor-container {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        #editor {
            background: #ffffff;
            width: 100%;
            max-width: 800px;
            min-height: 85vh;
            padding: 60px 80px;
            border-radius: 12px;
            border: 1px solid #eaeaea;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            outline: none;
            line-height: 1.7;
            font-size: 1.05rem;
        }

        /* Clean Editor Internal HTML Styles */
        #editor h1 { font-family: 'Cormorant Infant', serif; font-size: 2.8rem; margin-top: 0; color: #111; }
        #editor h2 { font-weight: 700; color: #222; margin-top: 1.5em; border-bottom: 1px solid #eaeaea; padding-bottom: 8px;}
        #editor p { color: #333; }
        #editor a { color: #667eea; text-decoration: none; border-bottom: 1px solid transparent; transition: border 0.2s; }
        #editor a:hover { border-bottom: 1px solid #667eea; }
        #editor code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; color: #eb5757; }
        
        #editor .section { margin-bottom: 30px; }
        #editor .analogy { background: #f8faff; border-left: 3px solid #667eea; padding: 16px 20px; margin: 20px 0; border-radius: 0 8px 8px 0; font-size: 0.95rem;}
        #editor .example { background: #fafafa; border: 1px solid #eaeaea; padding: 16px 20px; margin: 20px 0; border-radius: 8px; font-size: 0.95rem;}
        #editor pre { background: #f8f8f8; border: 1px solid #eaeaea; padding: 16px; border-radius: 8px; overflow-x: auto; }
        
        #editor table {
            border-collapse: collapse;
            width: 100%;
            border: 1px solid #eaeaea;
            border-radius: 8px;
            overflow: hidden;
            margin: 24px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        #editor th, #editor td { padding: 12px 16px; border-bottom: 1px solid #eaeaea; text-align: left; }
        #editor th { background-color: #fafafa; font-weight: 600; color: #444; }
        #editor tr:last-child td { border-bottom: none; }

        /* --- MOBILE FAB & SLIDE-UP MENU --- */
        .mobile-fab {
            display: none;
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #222;
            color: #fff;
            border: none;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            z-index: 1000;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .mobile-fab .material-symbols-outlined {
            color: #fff;
            font-size: 28px;
        }

        .menu-backdrop {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.2);
            z-index: 99;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 70vh;
                border-right: none;
                border-top: 1px solid #eaeaea;
                border-radius: 20px 20px 0 0;
                box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
                background: #fff;
                transform: translateY(100%);
                padding: 24px;
                z-index: 100;
                overflow-y: auto;
            }

            .sidebar.open {
                transform: translateY(0);
            }

            .menu-backdrop.open {
                display: block;
                opacity: 1;
            }

            .mobile-fab {
                display: flex;
            }

            .mobile-fab.open {
                transform: rotate(45deg);
                background: #e74c3c;
            }

            .editor-container {
                padding: 16px;
            }

            #editor {
                padding: 32px 24px;
                min-height: calc(100vh - 64px);
            }
        }
    </style>
</head>
<body>

    <div class="menu-backdrop" id="menuBackdrop" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebarMenu">
        <div class="sidebar-header">Kselis Notes</div>
        
        <div class="nav-section">
            <a href="../../index.html" class="nav-link">
                <span class="material-symbols-outlined">home</span> Home
            </a>
            <a href="../index.html" class="nav-link">
                <span class="material-symbols-outlined">library_books</span> Notes Portal
            </a>
        </div>
        
        <div class="divider"></div>
        
        <div class="nav-section">
            <div class="nav-label">Text Formatting</div>
            <select id="formatBlock" class="tool-btn" onchange="format('formatBlock', this.value); this.selectedIndex=0;">
                <option value="" disabled selected>Turn into...</option>
                <option value="H1">Heading 1</option>
                <option value="H2">Heading 2</option>
                <option value="P">Paragraph</option>
            </select>
            <button class="tool-btn" onclick="format('bold')">
                <span class="material-symbols-outlined">format_bold</span> Bold Text
            </button>
            <button class="tool-btn" onclick="format('italic')">
                <span class="material-symbols-outlined">format_italic</span> Italic Text
            </button>
            <button class="tool-btn" onclick="addLink()">
                <span class="material-symbols-outlined">link</span> Add Link
            </button>
            <button class="tool-btn" onclick="format('insertUnorderedList')">
                <span class="material-symbols-outlined">format_list_bulleted</span> Bullet List
            </button>
        </div>

        <div class="nav-section">
            <div class="nav-label">Insert Blocks</div>
            <button class="tool-btn" onclick="insertCustomBlock('section')">
                <span class="material-symbols-outlined">view_agenda</span> Section Wrapper
            </button>
            <button class="tool-btn" onclick="insertCustomBlock('analogy')">
                <span class="material-symbols-outlined">lightbulb</span> Analogy Box
            </button>
            <button class="tool-btn" onclick="insertCustomBlock('example')">
                <span class="material-symbols-outlined">edit_note</span> Example Box
            </button>
            <button class="tool-btn" onclick="insertTable()">
                <span class="material-symbols-outlined">table</span> Data Table
            </button>
        </div>
        
        <button class="export-btn" onclick="exportHTML()">
            <span class="material-symbols-outlined">save</span> Export Note
        </button>
    </nav>

    <button class="mobile-fab" id="fabToggle" onclick="toggleMenu()">
        <span class="material-symbols-outlined">add</span>
    </button>

    <div class="editor-container">
        <div id="editor" contenteditable="true">
            <h1>Note Title</h1>
            <div class="section">
                <h2>Introduction</h2>
                <p>Start typing your content here...</p>
                <ul>
                    <li>Press <b>Tab</b> to indent list items.</li>
                    <li>Press <b>Shift + Tab</b> to un-indent.</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // Toggle Mobile Menu
        function toggleMenu() {
            const sidebar = document.getElementById('sidebarMenu');
            const fab = document.getElementById('fabToggle');
            const backdrop = document.getElementById('menuBackdrop');
            const fabIcon = fab.querySelector('.material-symbols-outlined');
            
            sidebar.classList.toggle('open');
            fab.classList.toggle('open');
            backdrop.classList.toggle('open');
            
            if(fab.classList.contains('open')) {
                fabIcon.innerText = 'close';
            } else {
                fabIcon.innerText = 'add';
            }
        }

        // Core Text Formatting
        function format(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('editor').focus();
        }

        function addLink() {
            const url = prompt("Enter URL:", "https://");
            if (url) {
                document.execCommand('createLink', false, url);
            }
        }

        // Indent logic for lists
        document.getElementById('editor').addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault(); 
                if (e.shiftKey) {
                    document.execCommand('outdent', false, null); 
                } else {
                    document.execCommand('indent', false, null); 
                }
            }
        });

        // Insert custom block elements
        function insertCustomBlock(className) {
            const editor = document.getElementById('editor');
            editor.focus();
            
            const block = document.createElement('div');
            block.className = className;
            
            if (className === 'section') {
                block.innerHTML = '<h2>New Section</h2><p>Content goes here...</p><br>';
            } else if (className === 'analogy') {
                block.innerHTML = '<strong>Analogy:</strong> Replace this text.<br>';
            } else if (className === 'example') {
                block.innerHTML = '<strong>Example:</strong> Replace this text.<br>';
            }

            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                range.deleteContents();
                range.insertNode(block);
                range.setStartAfter(block);
                range.setEndAfter(block);
                selection.removeAllRanges();
                selection.addRange(range);
            } else {
                editor.appendChild(block);
            }
        }

        // Insert Table
        function insertTable() {
            const tableHTML = `
                <table cellpadding="8" cellspacing="0">
                    <thead><tr><th>Column 1</th><th>Column 2</th></tr></thead>
                    <tbody>
                        <tr><td>Data</td><td>Data</td></tr>
                        <tr><td>Data</td><td>Data</td></tr>
                    </tbody>
                </table><br>
            `;
            document.execCommand('insertHTML', false, tableHTML);
        }

        // Export Functionality
        function exportHTML() {
            const content = document.getElementById('editor').innerHTML;
            const fullHTML = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="../../kselis_logo/kselis_logo_nobg_light.png" type="image/x-icon">
  <title>Kselis Note</title>
</head>
<body>
${content}
  <a class="button" id="print" onclick="window.print()">Save as PDF</a>
</body>
</html>`;

            const blob = new Blob([fullHTML], { type: "text/html" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "kselis-note.html";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            // Close menu on mobile after clicking export
            if(window.innerWidth <= 900 && document.getElementById('sidebarMenu').classList.contains('open')) {
                toggleMenu();
            }
        }
    </script>
</body>
</html>
