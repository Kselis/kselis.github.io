<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kselis Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&family=Cormorant+Infant:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CORE STYLES & BACKGROUND --- */
        body {
            font-family: 'Raleway', sans-serif;
            margin: 0;
            /* Subtle background gradient to make the glassmorphism visible */
            background: linear-gradient(135deg, #e0e0e0 0%, #f4f4f4 50%, #d9d9d9 100%);
            color: #333;
            display: flex;
            height: 100vh;
            overflow: hidden; /* Prevent body scroll, scroll editor instead */
        }

        /* --- GLASSMORPHIC SIDEBAR (Desktop) --- */
        .sidebar {
            width: 260px;
            height: 100vh;
            padding: 25px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
            
            /* Glassmorphism Effect */
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Minimal Header */
        .sidebar-header {
            font-family: 'Cormorant Infant', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #222;
            text-align: center;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        /* Navigation Links */
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #667eea;
        }

        .divider {
            height: 1px;
            background: rgba(0, 0, 0, 0.1);
            margin: 0 10px;
        }

        /* --- GLASSMORPHIC BUTTONS & TOOLS --- */
        .tools-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            overflow-y: auto; /* Allow scrolling if window is short */
            padding-bottom: 20px;
        }

        .tools-grid select, .tools-grid button, .export-btn {
            /* Glassmorphic Button Base */
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            
            color: #333;
            padding: 10px;
            border-radius: 8px;
            font-family: 'Raleway', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.2s ease;
            outline: none;
        }

        .tools-grid button:hover, .tools-grid select:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
        }

        .tools-grid select {
            grid-column: span 2;
            flex-direction: row;
        }

        /* Make the Export Button pop slightly */
        .export-btn {
            grid-column: span 2;
            background: rgba(102, 126, 234, 0.85); /* Accent color glass */
            color: #fff;
            border: 1px solid rgba(102, 126, 234, 0.4);
            font-size: 0.9rem;
            margin-top: 10px;
            padding: 12px;
        }

        .export-btn:hover {
            background: rgba(102, 126, 234, 1);
        }

        .icon {
            font-size: 1.1rem;
            font-style: normal;
        }

        /* --- MAIN EDITOR CONTENT AREA --- */
        .editor-container {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            box-sizing: border-box;
        }

        #editor {
            background: #fff;
            width: 100%;
            max-width: 900px;
            min-height: 80vh;
            padding: 60px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            outline: none;
            line-height: 1.6;
        }

        /* Editor Internal HTML Styles (Mirroring Kselis live styles) */
        #editor h1, #editor h2 { color: #333; }
        #editor a { color: #667eea; text-decoration: none; font-weight: bold; }
        #editor a:hover { text-decoration: underline; }
        #editor code { background: #f4f4f4; padding: 2px 4px; border-radius: 3px; }
        #editor .section { margin-bottom: 30px; }
        #editor .analogy { background: #e7f3fe; border-left: 4px solid #2196F3; padding: 12px; margin: 15px 0; display: block; border-radius: 0 4px 4px 0;}
        #editor .example { background: #f9f9f9; border: 1px solid #ddd; padding: 12px; margin: 15px 0; display: block; border-radius: 4px;}
        #editor pre { background: #f4f4f4; border: 1px solid #ccc; padding: 15px; overflow-x: auto; border-radius: 4px;}
        
        #editor table {
            border-collapse: collapse;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            margin: 20px 0;
        }
        #editor th, #editor td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        #editor th { background-color: #f9f9f9; font-weight: bold; }

        /* --- MOBILE: FLOATING ACTION BUTTON --- */
        .fab-btn {
            display: none;
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #222;
            color: #fff;
            border: none;
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s ease;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        .fab-btn.open {
            transform: rotate(45deg);
            background: #e74c3c; 
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }

            .fab-btn {
                display: flex; /* Activate FAB */
            }

            /* Convert sidebar into a floating mobile menu */
            .sidebar {
                position: fixed;
                bottom: 100px; /* Float above the FAB */
                right: 20px;
                width: 280px;
                height: auto;
                max-height: 70vh;
                border-radius: 16px;
                padding: 20px;
                
                /* Start hidden */
                visibility: hidden;
                opacity: 0;
                transform: scale(0.8) translateY(30px);
                transform-origin: bottom right;
            }

            .sidebar.open {
                visibility: visible;
                opacity: 1;
                transform: scale(1) translateY(0);
            }

            .sidebar-header {
                font-size: 1.5rem;
            }

            .editor-container {
                padding: 15px;
                height: 100vh; /* Full screen when sidebar is hidden */
            }

            #editor {
                padding: 30px 20px;
                min-height: auto; /* Allow natural scrolling */
            }

            #editor table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebarMenu">
        <div class="sidebar-header">Kselis Editor</div>
        
        <div class="nav-links">
            <a href="../../index.html"><span class="icon">🏠</span> Home</a>
            <a href="../index.html"><span class="icon">📚</span> ML Notes</a>
        </div>
        
        <div class="divider"></div>
        
        <div class="tools-grid">
            <select id="formatBlock" onchange="format('formatBlock', this.value); this.selectedIndex=0;">
                <option value="" disabled selected>Formatting ▼</option>
                <option value="H1">Title (H1)</option>
                <option value="H2">Subtitle (H2)</option>
                <option value="P">Paragraph</option>
            </select>
            
            <button onclick="format('bold')">
                <span class="icon"><b>B</b></span> Bold
            </button>
            <button onclick="format('italic')">
                <span class="icon"><i>I</i></span> Italic
            </button>
            <button onclick="addLink()">
                <span class="icon">🔗</span> Link
            </button>
            <button onclick="format('insertUnorderedList')">
                <span class="icon">•</span> List
            </button>
            
            <button onclick="insertCustomBlock('section')">
                <span class="icon">📑</span> Section
            </button>
            <button onclick="insertTable()">
                <span class="icon">⊞</span> Table
            </button>
            <button onclick="insertCustomBlock('analogy')">
                <span class="icon">💡</span> Analogy
            </button>
            <button onclick="insertCustomBlock('example')">
                <span class="icon">📝</span> Example
            </button>
            
            <button class="export-btn" onclick="exportHTML()">
                <span class="icon" style="color:white;">💾</span> Save & Export
            </button>
        </div>
    </nav>

    <button class="fab-btn" id="fabToggle" onclick="toggleFab()">+</button>

    <div class="editor-container">
        <div id="editor" contenteditable="true">
            <h1>New Kselis Note</h1>
            <div class="section">
                <h2>Introduction</h2>
                <p>Start drafting your notes here...</p>
                <ul>
                    <li>Press <b>Tab</b> to indent lists, and <b>Shift+Tab</b> to un-indent.</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // Toggle the Mobile FAB Menu
        function toggleFab() {
            const sidebar = document.getElementById('sidebarMenu');
            const fab = document.getElementById('fabToggle');
            sidebar.classList.toggle('open');
            fab.classList.toggle('open');
        }

        // Core Text Formatting
        function format(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('editor').focus();
        }

        // Add Links
        function addLink() {
            const url = prompt("Enter link URL (e.g., https://kselis.github.io):", "https://");
            if (url) {
                document.execCommand('createLink', false, url);
            }
        }

        // Tab Key Logic for Lists
        document.getElementById('editor').addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault(); 
                if (e.shiftKey) {
                    document.execCommand('outdent', false, null); 
                } else {
                    document.execCommand('indent', false, null); 
                }
            }
        });

        // Insert Structural Divs
        function insertCustomBlock(className) {
            const editor = document.getElementById('editor');
            editor.focus();
            
            const block = document.createElement('div');
            block.className = className;
            
            if (className === 'section') {
                block.innerHTML = '<h2>New Section</h2><p>Content goes here...</p><br>';
            } else if (className === 'analogy') {
                block.innerHTML = '<strong>Analogy:</strong> Replace this text.<br>';
            } else if (className === 'example') {
                block.innerHTML = '<strong>Example:</strong> Replace this text.<br>';
            }

            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                range.deleteContents();
                range.insertNode(block);
                range.setStartAfter(block);
                range.setEndAfter(block);
                selection.removeAllRanges();
                selection.addRange(range);
            } else {
                editor.appendChild(block);
            }
        }

        // Insert Table
        function insertTable() {
            const tableHTML = `
                <table cellpadding="8" cellspacing="0">
                    <thead><tr><th>Header 1</th><th>Header 2</th></tr></thead>
                    <tbody><tr><td>Data 1</td><td>Data 2</td></tr></tbody>
                </table><br>
            `;
            document.execCommand('insertHTML', false, tableHTML);
        }

        // Export functionality
        function exportHTML() {
            const content = document.getElementById('editor').innerHTML;
            const fullHTML = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="../../kselis_logo/kselis_logo_nobg_light.png" type="image/x-icon">
  <title>Kselis Note</title>
</head>
<body>
${content}
  <a class="button" id="print" onclick="window.print()">Save as PDF</a>
</body>
</html>`;

            const blob = new Blob([fullHTML], { type: "text/html" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "kselis-note.html";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            // Auto-close menu on mobile after save
            if(window.innerWidth <= 900) {
                toggleFab();
            }
        }
    </script>
</body>
</html>
