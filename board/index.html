<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kselis Whiteboard</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <style>
    /* --- CORE STYLES --- */
    body {
      font-family: 'Raleway', sans-serif;
      margin: 0;
      background-color: #fafafa;
      color: #333;
      display: flex;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
    }

    /* --- MINIMALIST SIDEBAR --- */
    .sidebar {
      width: 70px;
      background-color: #f4f4f4;
      border-right: 1px solid #eaeaea;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      box-sizing: border-box;
      z-index: 100;
      gap: 12px;
    }

    .tool-btn {
      background: transparent;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }

    .tool-btn:hover {
      background-color: #e8e8e8;
      color: #111;
    }

    .tool-btn.active {
      background-color: #e2e8f0;
      color: #111;
      box-shadow: inset 0 0 0 1px #cbd5e1;
    }

    .tool-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .divider {
      width: 30px;
      height: 1px;
      background-color: #ddd;
      margin: 4px 0;
    }

    /* --- OPTIONS PANEL (Colors & Size) --- */
    .options-panel {
      position: absolute;
      left: 80px;
      top: 20px;
      background: #fff;
      border: 1px solid #eaeaea;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      display: none;
      flex-direction: column;
      gap: 15px;
      z-index: 90;
    }

    .options-panel.visible {
      display: flex;
    }

    .opt-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="color"] {
      width: 28px; height: 28px;
      border: 1px solid #ddd;
      border-radius: 50%;
      cursor: pointer;
      padding: 0;
      background: transparent;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

    input[type="range"] {
      flex: 1;
      height: 4px;
      background: #e2e8f0;
      border-radius: 4px;
      -webkit-appearance: none;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      background: #667eea;
      border-radius: 50%;
      cursor: pointer;
    }

    /* --- BOTTOM NAV (Zoom & Pages) --- */
    .bottom-nav {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border: 1px solid #eaeaea;
      border-radius: 30px;
      padding: 5px 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      z-index: 90;
    }

    .nav-btn {
      background: transparent;
      border: none;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .nav-btn:hover { background: #f0f0f0; }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .page-info {
      font-size: 0.9rem;
      font-weight: 600;
      min-width: 50px;
      text-align: center;
      color: #333;
    }

    /* --- CANVAS & INTERACTIVES --- */
    .canvas-container {
      flex-grow: 1;
      position: relative;
      overflow: hidden;
      background-color: #fafafa;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      cursor: crosshair;
    }

    .canvas-item-wrapper {
      position: absolute;
      border: 1px dashed transparent;
      cursor: grab;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: none;
    }

    .canvas-item-wrapper.active {
      border-color: #667eea;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      z-index: 1000;
    }

    .canvas-item-wrapper .editable-text {
      background: transparent;
      border: none;
      outline: none;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Raleway', sans-serif;
      min-width: 30px;
      min-height: 20px;
      padding: 5px;
    }

    .canvas-item-wrapper img {
      width: 100%; height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    /* Floating Item Handles */
    .handle {
      position: absolute;
      width: 24px; height: 24px;
      background: #fff;
      border: 1px solid #eaeaea;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      z-index: 1001;
      color: #555;
      cursor: pointer;
    }
    .handle:hover { background: #f4f4f4; }
    .resize-handle { bottom: -12px; right: -12px; cursor: nwse-resize; }
    .done-handle { top: -12px; right: -12px; color: #667eea; }
    .drag-handle { top: -12px; left: -12px; cursor: move; }

    /* --- MOBILE RESPONSIVENESS --- */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      
      .sidebar {
        width: 100%;
        height: 65px;
        flex-direction: row;
        border-right: none;
        border-bottom: 1px solid #eaeaea;
        padding: 0 10px;
        overflow-x: auto;
        justify-content: flex-start;
      }
      
      .divider { width: 1px; height: 30px; margin: 0 5px; }
      
      .options-panel { top: 75px; left: 10px; right: 10px; }
      
      .bottom-nav {
        bottom: 10px;
        width: 90%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>

  <nav class="sidebar">
    <button class="tool-btn" id="btnUndo" title="Undo"><span class="material-symbols-outlined">undo</span></button>
    <button class="tool-btn" id="btnRedo" title="Redo"><span class="material-symbols-outlined">redo</span></button>
    
    <div class="divider"></div>
    
    <button class="tool-btn" data-tool="select" title="Select & Edit"><span class="material-symbols-outlined">arrow_selector_tool</span></button>
    <button class="tool-btn active" data-tool="pen" title="Pen"><span class="material-symbols-outlined">edit</span></button>
    <button class="tool-btn" data-tool="eraser" title="Eraser"><span class="material-symbols-outlined">ink_eraser</span></button>
    <button class="tool-btn" data-tool="line" title="Line"><span class="material-symbols-outlined">horizontal_rule</span></button>
    <button class="tool-btn" data-tool="rect" title="Rectangle"><span class="material-symbols-outlined">crop_square</span></button>
    <button class="tool-btn" data-tool="text" title="Text"><span class="material-symbols-outlined">title</span></button>
    <button class="tool-btn" data-tool="image" title="Image"><span class="material-symbols-outlined">image</span></button>
    <button class="tool-btn" data-tool="pan" title="Pan"><span class="material-symbols-outlined">pan_tool</span></button>
    
    <div class="divider"></div>
    
    <button class="tool-btn" id="btnOptions" title="Settings"><span class="material-symbols-outlined">tune</span></button>
    <button class="tool-btn" id="btnClear" title="Clear"><span class="material-symbols-outlined">delete</span></button>
    <button class="tool-btn" id="btnSave" title="Save PDF"><span class="material-symbols-outlined">save</span></button>
  </nav>

  <div class="options-panel" id="optionsPanel"></div>

  <div class="canvas-container">
    <canvas id="board"></canvas>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn" id="prevPage"><span class="material-symbols-outlined">arrow_back</span></button>
    <span class="page-info" id="pageIndicator">1 / 1</span>
    <button class="nav-btn" id="nextPage"><span class="material-symbols-outlined">arrow_forward</span></button>
    <button class="nav-btn" id="addPage" style="color:#667eea;"><span class="material-symbols-outlined">add_circle</span></button>
    
    <div style="width:1px; height:20px; background:#ddd; margin:0 5px;"></div>
    
    <span class="material-symbols-outlined" style="font-size:18px; color:#888;">zoom_in</span>
    <input type="range" id="zoomSlider" min="0.1" max="5" step="0.1" value="1" style="width: 80px;">
  </div>

  <input type="file" id="fileInput" accept="image/*" style="display: none;" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <script>
    /**
     * Application State
     */
    const state = {
      tool: 'pen',
      color: '#333333',
      size: 4,
      eraserSize: 30,
      textSize: 24,
      isDrawing: false,
      isPanning: false,
      pages: [{ paths: [], offsetX: 0, offsetY: 0, scale: 1 }],
      currentPage: 0,
      dpr: window.devicePixelRatio || 1, 
      panStart: { x: 0, y: 0 },
      activeItem: null,
      history: [],
      redoStack: []
    };

    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const tools = document.querySelectorAll('.tool-btn[data-tool]');
    const optionsPanel = document.getElementById('optionsPanel');

    const TOOL_CONFIGS = {
      select: { hasColor: false, hasSize: false },
      pen: { hasColor: true, hasSize: true, minSize: 1, maxSize: 50 },
      eraser: { hasColor: false, hasSize: true, minSize: 10, maxSize: 100 },
      line: { hasColor: true, hasSize: true, minSize: 1, maxSize: 20 },
      rect: { hasColor: true, hasSize: true, minSize: 1, maxSize: 20 },
      text: { hasColor: true, hasSize: true, minSize: 12, maxSize: 120 },
      image: { hasColor: false, hasSize: false },
      pan: { hasColor: false, hasSize: false }
    };

    /**
     * Initialization & Resizing
     */
    function resizeCanvas() {
      const container = document.querySelector('.canvas-container');
      const w = container.clientWidth;
      const h = container.clientHeight;
      canvas.width = w * state.dpr;
      canvas.height = h * state.dpr;
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;
      ctx.scale(state.dpr, state.dpr);
      redraw();
    }
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 0);

    function getPointerPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const page = state.pages[state.currentPage];
      return {
        x: (clientX - rect.left - page.offsetX) / page.scale,
        y: (clientY - rect.top - page.offsetY) / page.scale
      };
    }

    /**
     * History (Undo/Redo)
     */
    function saveState() {
      const page = state.pages[state.currentPage];
      state.history.push(JSON.parse(JSON.stringify(page.paths)));
      if (state.history.length > 50) state.history.shift();
      state.redoStack = [];
      updateHistoryButtons();
    }

    function undo() {
      if (state.history.length === 0) return;
      if (state.activeItem) finalizeItem(); 
      const page = state.pages[state.currentPage];
      state.redoStack.push(JSON.parse(JSON.stringify(page.paths)));
      page.paths = state.history.pop();
      redraw(); updateHistoryButtons();
    }

    function redo() {
      if (state.redoStack.length === 0) return;
      if (state.activeItem) finalizeItem();
      const page = state.pages[state.currentPage];
      state.history.push(JSON.parse(JSON.stringify(page.paths)));
      page.paths = state.redoStack.pop();
      redraw(); updateHistoryButtons();
    }

    function updateHistoryButtons() {
      document.getElementById('btnUndo').disabled = state.history.length === 0;
      document.getElementById('btnRedo').disabled = state.redoStack.length === 0;
    }
    
    window.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
            e.preventDefault();
            e.shiftKey ? redo() : undo();
        }
    });

    document.getElementById('btnUndo').addEventListener('click', undo);
    document.getElementById('btnRedo').addEventListener('click', redo);
    document.getElementById('btnClear').addEventListener('click', () => {
        if(confirm("Clear this page?")) { saveState(); state.pages[state.currentPage].paths = []; redraw(); }
    });

    /**
     * Toolbar & Options Panel
     */
    function setActiveTool(toolName) {
      if (state.activeItem) finalizeItem();
      state.tool = toolName;
      
      tools.forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.tool-btn[data-tool="${toolName}"]`).classList.add('active');

      canvas.style.cursor = toolName === 'pan' ? 'grab' : toolName === 'select' ? 'default' : toolName === 'text' ? 'text' : 'crosshair';
      if(optionsPanel.classList.contains('visible')) renderOptions(toolName);
    }

    function renderOptions(toolName) {
      const config = TOOL_CONFIGS[toolName];
      optionsPanel.innerHTML = '';
      
      if (!config || (!config.hasColor && !config.hasSize)) {
          optionsPanel.innerHTML = '<div style="font-size:0.85rem; color:#888;">No settings needed.</div>';
          return;
      }

      if (config.hasColor) {
        const row = document.createElement('div'); row.className = 'opt-row';
        const colorInput = document.createElement('input'); colorInput.type = 'color'; colorInput.value = state.color;
        
        colorInput.oninput = (e) => {
           state.color = e.target.value;
           if(state.activeItem && state.activeItem.dataset.type === 'text') {
               state.activeItem.querySelector('.editable-text').style.color = state.color;
           }
        };
        const label = document.createElement('span'); label.innerText = 'Color'; label.style.fontSize = '0.9rem';
        row.appendChild(colorInput); row.appendChild(label); optionsPanel.appendChild(row);
      }

      if (config.hasSize) {
        const row = document.createElement('div'); row.className = 'opt-row';
        const slider = document.createElement('input'); slider.type = 'range';
        slider.min = config.minSize; slider.max = config.maxSize;
        slider.value = (toolName === 'eraser') ? state.eraserSize : (toolName === 'text' ? state.textSize : state.size);
        
        const display = document.createElement('span'); display.innerText = slider.value + 'px'; display.style.fontSize = '0.9rem'; display.style.width = '40px';

        slider.oninput = (e) => {
          const val = parseInt(e.target.value);
          if (toolName === 'eraser') state.eraserSize = val;
          else if (toolName === 'text') {
              state.textSize = val;
              if (state.activeItem && state.activeItem.dataset.type === 'text') {
                 const ta = state.activeItem.querySelector('.editable-text');
                 ta.style.fontSize = val + 'px';
                 state.activeItem.dataset.fontSize = val;
              }
          } else state.size = val;
          display.innerText = val + 'px';
        };
        row.appendChild(slider); row.appendChild(display); optionsPanel.appendChild(row);
      }
    }

    document.getElementById('btnOptions').addEventListener('click', () => {
      optionsPanel.classList.toggle('visible');
      renderOptions(state.tool);
    });

    tools.forEach(btn => {
      btn.addEventListener('click', () => {
        const t = btn.dataset.tool;
        if (t === 'image') { document.getElementById('fileInput').click(); return; }
        setActiveTool(t);
      });
    });

    /**
     * Hit Testing for Select & Edit Text
     */
    function checkHit(x, y) {
       const page = state.pages[state.currentPage];
       for (let i = page.paths.length - 1; i >= 0; i--) {
          const p = page.paths[i];
          if (p.tool === 'text' || p.tool === 'image') {
             if (x >= p.x && x <= p.x + p.w && y >= p.y && y <= p.y + p.h) return i;
          }
       }
       return -1;
    }

    /**
     * Drawing & Canvas Events
     */
    canvas.addEventListener('pointerdown', startDraw);
    canvas.addEventListener('pointermove', moveDraw);
    canvas.addEventListener('pointerup', endDraw);

    function startDraw(e) {
      if (e.target !== canvas) return;
      const pos = getPointerPos(e);
      const page = state.pages[state.currentPage];

      if (state.tool === 'pan') {
        state.isPanning = true; state.panStart = { x: e.clientX, y: e.clientY };
        canvas.style.cursor = 'grabbing'; return;
      }

      // Check if clicking existing text/image to Edit
      if (state.tool === 'select' || state.tool === 'text') {
         const hitIndex = checkHit(pos.x, pos.y);
         if (hitIndex !== -1 && (state.tool === 'select' || page.paths[hitIndex].tool === 'text')) {
            saveState(); 
            const item = page.paths[hitIndex];
            page.paths.splice(hitIndex, 1);
            redraw();
            createItem(item.tool, item.x, item.y, null, item);
            return;
         }
         // If text tool and clicked empty space, create new text
         if (state.tool === 'text') {
            createItem('text', pos.x, pos.y);
            return;
         }
      }

      saveState();
      state.isDrawing = true;
      const drawSize = (state.tool === 'eraser') ? state.eraserSize : state.size;

      if (state.tool === 'pen' || state.tool === 'eraser') {
        currentPath = { tool: state.tool, color: state.color, size: drawSize, points: [{ x: pos.x, y: pos.y }] };
        page.paths.push(currentPath);
      } else if (state.tool === 'line' || state.tool === 'rect') {
        state.shapeStart = { x: pos.x, y: pos.y };
      }
    }

    function moveDraw(e) {
      const page = state.pages[state.currentPage];
      if (state.isPanning) {
        page.offsetX += e.clientX - state.panStart.x;
        page.offsetY += e.clientY - state.panStart.y;
        state.panStart = { x: e.clientX, y: e.clientY };
        redraw(); return;
      }
      if (!state.isDrawing) return;
      const pos = getPointerPos(e);

      if (state.tool === 'pen' || state.tool === 'eraser') {
        currentPath.points.push({ x: pos.x, y: pos.y }); redraw();
      } else if (state.tool === 'line' || state.tool === 'rect') {
        redraw(); drawShapePreview(pos);
      }
    }

    function endDraw(e) {
      if (state.isPanning) { state.isPanning = false; canvas.style.cursor = 'grab'; return; }
      if (!state.isDrawing) return;
      state.isDrawing = false;
      const pos = getPointerPos(e);
      const page = state.pages[state.currentPage];

      if (state.tool === 'line') {
        page.paths.push({ tool: 'line', color: state.color, size: state.size, start: state.shapeStart, end: { x: pos.x, y: pos.y } });
      } else if (state.tool === 'rect') {
         page.paths.push({ tool: 'rect', color: state.color, size: state.size, start: state.shapeStart, w: pos.x - state.shapeStart.x, h: pos.y - state.shapeStart.y });
      }
      redraw();
    }

    /**
     * Rendering Engine
     */
    function redraw() {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const page = state.pages[state.currentPage];
      ctx.setTransform(state.dpr * page.scale, 0, 0, state.dpr * page.scale, state.dpr * page.offsetX, state.dpr * page.offsetY);

      for (const path of page.paths) {
        ctx.beginPath(); ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        if (path.tool === 'eraser') { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = path.size; }
        else { ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = path.color; ctx.fillStyle = path.color; ctx.lineWidth = path.size; }

        if (path.tool === 'pen' || path.tool === 'eraser') {
          if (path.points.length < 2) continue;
          ctx.moveTo(path.points[0].x, path.points[0].y);
          for (let i = 1; i < path.points.length - 2; i++) {
            const xc = (path.points[i].x + path.points[i + 1].x) / 2;
            const yc = (path.points[i].y + path.points[i + 1].y) / 2;
            ctx.quadraticCurveTo(path.points[i].x, path.points[i].y, xc, yc);
          }
          ctx.quadraticCurveTo(path.points[path.points.length-2].x, path.points[path.points.length-2].y, path.points[path.points.length-1].x, path.points[path.points.length-1].y);
          ctx.stroke();

        } else if (path.tool === 'line') {
          ctx.moveTo(path.start.x, path.start.y); ctx.lineTo(path.end.x, path.end.y); ctx.stroke();
        } else if (path.tool === 'rect') {
          ctx.strokeRect(path.start.x, path.start.y, path.w, path.h);
        } else if (path.tool === 'text') {
          ctx.globalCompositeOperation = 'source-over';
          ctx.font = `${path.fontSize}px 'Raleway', sans-serif`;
          ctx.textBaseline = 'top';
          const lines = path.content.split('\n');
          const lh = path.fontSize * 1.2;
          // Offset by 5px to align perfectly with the WYSIWYG padding
          lines.forEach((line, i) => ctx.fillText(line, path.x + 5, path.y + 5 + (i * lh)));
        } else if (path.tool === 'image') {
          ctx.globalCompositeOperation = 'source-over';
          try { ctx.drawImage(path.imgElement, path.x, path.y, path.w, path.h); } catch(e) { }
        }
      }
      ctx.globalCompositeOperation = 'source-over';
    }

    function drawShapePreview(currentPos) {
       ctx.strokeStyle = state.color; ctx.lineWidth = state.size; ctx.beginPath();
       if (state.tool === 'line') { ctx.moveTo(state.shapeStart.x, state.shapeStart.y); ctx.lineTo(currentPos.x, currentPos.y); } 
       else if (state.tool === 'rect') { ctx.rect(state.shapeStart.x, state.shapeStart.y, currentPos.x - state.shapeStart.x, currentPos.y - state.shapeStart.y); }
       ctx.stroke();
    }

    /**
     * Item Wrapper (WYSIWYG Text & Image)
     */
    function createItem(type, x, y, imgSource, existingData = null) {
       if (state.activeItem) finalizeItem();
       
       const wrapper = document.createElement('div');
       wrapper.className = 'canvas-item-wrapper active';
       
       const page = state.pages[state.currentPage];
       wrapper.style.left = (x * page.scale + page.offsetX) + 'px';
       wrapper.style.top = (y * page.scale + page.offsetY) + 'px';
       wrapper.dataset.worldX = x; wrapper.dataset.worldY = y; wrapper.dataset.type = type;

       let currentFontSize = existingData ? existingData.fontSize : state.textSize;
       let currentColor = existingData ? existingData.color : state.color;

       if (type === 'text') {
         const ta = document.createElement('div');
         ta.className = 'editable-text';
         ta.contentEditable = "true";
         ta.style.fontSize = currentFontSize + 'px';
         ta.style.lineHeight = '1.2';
         ta.style.color = currentColor;
         
         if (existingData) ta.innerText = existingData.content;
         wrapper.appendChild(ta);
         wrapper.dataset.fontSize = currentFontSize;

         setTimeout(() => {
           ta.focus();
           const range = document.createRange(); const sel = window.getSelection();
           range.selectNodeContents(ta); range.collapse(false);
           sel.removeAllRanges(); sel.addRange(range);
         }, 50);

       } else if (type === 'image') {
         const img = document.createElement('img');
         if (existingData) {
             img.src = existingData.imgElement.src;
             wrapper.style.width = (existingData.w * page.scale) + 'px';
             wrapper.style.height = (existingData.h * page.scale) + 'px';
         } else {
             img.src = imgSource;
             img.onload = () => wrapper.style.height = (300 * (img.naturalHeight / img.naturalWidth)) + 'px'; 
             wrapper.style.width = '300px'; 
         }
         wrapper.appendChild(img);
       }

       // Drag Handle
       const dragHandle = document.createElement('div'); dragHandle.className = 'handle drag-handle';
       dragHandle.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">drag_indicator</span>';
       wrapper.appendChild(dragHandle);
       
       // Resize Handle (Only for Images)
       if (type === 'image') {
           const resizeHandle = document.createElement('div'); resizeHandle.className = 'handle resize-handle';
           resizeHandle.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px;">open_in_full</span>';
           wrapper.appendChild(resizeHandle);
       }
       
       // Done Handle
       const doneBtn = document.createElement('div'); doneBtn.className = 'handle done-handle';
       doneBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">check</span>';
       doneBtn.onclick = (e) => { e.stopPropagation(); finalizeItem(); };
       wrapper.appendChild(doneBtn);

       setupInteractions(wrapper);
       document.querySelector('.canvas-container').appendChild(wrapper);
       state.activeItem = wrapper;
    }

    function setupInteractions(el) {
       let startX, startY, startW, startH, startLeft, startTop;

       const dragHandle = el.querySelector('.drag-handle');
       dragHandle.addEventListener('pointerdown', (e) => {
         e.stopPropagation(); e.preventDefault();
         startX = e.clientX; startY = e.clientY; startLeft = parseInt(el.style.left); startTop = parseInt(el.style.top);
         function doDrag(ev) { el.style.left = (startLeft + (ev.clientX - startX)) + 'px'; el.style.top = (startTop + (ev.clientY - startY)) + 'px'; }
         function stopDrag() {
            window.removeEventListener('pointermove', doDrag); window.removeEventListener('pointerup', stopDrag);
            const page = state.pages[state.currentPage];
            el.dataset.worldX = (parseInt(el.style.left) - page.offsetX) / page.scale;
            el.dataset.worldY = (parseInt(el.style.top) - page.offsetY) / page.scale;
         }
         window.addEventListener('pointermove', doDrag); window.addEventListener('pointerup', stopDrag);
       });

       const resizeHandle = el.querySelector('.resize-handle');
       if(resizeHandle) {
         resizeHandle.addEventListener('pointerdown', (e) => {
           e.stopPropagation(); e.preventDefault();
           startX = e.clientX; startY = e.clientY; startW = el.offsetWidth; startH = el.offsetHeight;
           function doResize(ev) { el.style.width = (startW + (ev.clientX - startX)) + 'px'; el.style.height = (startH + (ev.clientY - startY)) + 'px'; }
           function stopResize() { window.removeEventListener('pointermove', doResize); window.removeEventListener('pointerup', stopResize); }
           window.addEventListener('pointermove', doResize); window.addEventListener('pointerup', stopResize);
         });
       }
    }

    function finalizeItem() {
       if (!state.activeItem) return;
       const el = state.activeItem;
       const type = el.dataset.type;
       const page = state.pages[state.currentPage];
       
       const worldX = parseFloat(el.dataset.worldX); const worldY = parseFloat(el.dataset.worldY);
       const w = el.offsetWidth / page.scale; const h = el.offsetHeight / page.scale;

       saveState();

       if (type === 'text') {
          const ta = el.querySelector('.editable-text');
          if (ta.innerText.trim()) {
             page.paths.push({
               tool: 'text', content: ta.innerText,
               x: worldX, y: worldY, w: w, h: h,
               color: ta.style.color, fontSize: parseInt(el.dataset.fontSize)
             });
          }
       } else if (type === 'image') {
          page.paths.push({ tool: 'image', imgElement: el.querySelector('img'), x: worldX, y: worldY, w: w, h: h });
       }

       el.remove(); state.activeItem = null; redraw();
    }

    // Image Upload
    document.getElementById('fileInput').addEventListener('change', (e) => {
       const file = e.target.files[0]; if (!file) return;
       const reader = new FileReader();
       reader.onload = (ev) => {
          const page = state.pages[state.currentPage];
          const centerX = (canvas.width/state.dpr/2 - page.offsetX)/page.scale;
          const centerY = (canvas.height/state.dpr/2 - page.offsetY)/page.scale;
          createItem('image', centerX - 100, centerY - 100, ev.target.result);
       };
       reader.readAsDataURL(file); e.target.value = ''; 
    });

    /**
     * Page Navigation & Zoom
     */
    function updatePageUI() {
       document.getElementById('pageIndicator').innerText = `${state.currentPage + 1} / ${state.pages.length}`;
       document.getElementById('prevPage').disabled = state.currentPage === 0;
       document.getElementById('nextPage').disabled = state.currentPage === state.pages.length - 1;
       document.getElementById('zoomSlider').value = state.pages[state.currentPage].scale.toFixed(1);
       state.history = []; state.redoStack = []; updateHistoryButtons(); redraw();
    }

    document.getElementById('addPage').addEventListener('click', () => {
       if(state.activeItem) finalizeItem();
       state.pages.push({ paths: [], offsetX: 0, offsetY: 0, scale: 1 });
       state.currentPage = state.pages.length - 1; updatePageUI();
    });
    document.getElementById('prevPage').addEventListener('click', () => {
       if(state.activeItem) finalizeItem();
       if (state.currentPage > 0) { state.currentPage--; updatePageUI(); }
    });
    document.getElementById('nextPage').addEventListener('click', () => {
       if(state.activeItem) finalizeItem();
       if (state.currentPage < state.pages.length - 1) { state.currentPage++; updatePageUI(); }
    });
    document.getElementById('zoomSlider').addEventListener('input', (e) => {
       state.pages[state.currentPage].scale = parseFloat(e.target.value);
       if(state.activeItem) finalizeItem(); redraw();
    });

    /**
     * PDF Export
     */
    document.getElementById('btnSave').addEventListener('click', () => {
      if(state.activeItem) finalizeItem();
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'landscape', unit: 'px' });
      doc.deletePage(1);

      const tempCanvas = document.createElement('canvas'); const tCtx = tempCanvas.getContext('2d');

      state.pages.forEach(page => {
         let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
         if (page.paths.length === 0) { minX=0; minY=0; maxX=800; maxY=600; } 
         else {
            page.paths.forEach(p => {
               if(p.tool === 'pen' || p.tool === 'eraser') {
                 p.points.forEach(pt => {
                    if(pt.x < minX) minX = pt.x; if(pt.x > maxX) maxX = pt.x;
                    if(pt.y < minY) minY = pt.y; if(pt.y > maxY) maxY = pt.y;
                 });
               } else {
                 const rX = p.start ? p.start.x : p.x; const rY = p.start ? p.start.y : p.y;
                 const rW = p.w || 0; const rH = p.h || 0;
                 if(rX < minX) minX = rX; if(rX+rW > maxX) maxX = rX+rW;
                 if(rY < minY) minY = rY; if(rY+rH > maxY) maxY = rY+rH;
               }
            });
         }
         
         const padding = 50; const w = (maxX - minX) + padding*2; const h = (maxY - minY) + padding*2;
         tempCanvas.width = w; tempCanvas.height = h;
         
         tCtx.fillStyle = '#ffffff'; tCtx.fillRect(0,0,w,h);
         tCtx.translate(-minX + padding, -minY + padding);
         
         page.paths.forEach(path => {
             tCtx.beginPath(); tCtx.lineCap = 'round'; tCtx.lineJoin = 'round';
             if(path.tool === 'eraser') { tCtx.globalCompositeOperation = 'destination-out'; tCtx.lineWidth = path.size; }
             else { tCtx.globalCompositeOperation = 'source-over'; tCtx.strokeStyle = path.color; tCtx.fillStyle = path.color; tCtx.lineWidth = path.size; }

             if(path.tool === 'pen' || path.tool === 'eraser') {
                if(path.points.length>1) {
                  tCtx.moveTo(path.points[0].x, path.points[0].y);
                  for(let i=1; i<path.points.length; i++) tCtx.lineTo(path.points[i].x, path.points[i].y);
                  tCtx.stroke();
                }
             } else if (path.tool === 'text') {
                tCtx.font = `${path.fontSize}px 'Raleway', sans-serif`; tCtx.textBaseline = 'top';
                const lines = path.content.split('\n'); const lh = path.fontSize * 1.2;
                lines.forEach((line, i) => tCtx.fillText(line, path.x + 5, path.y + 5 + i*lh));
             } else if (path.tool === 'rect') { tCtx.strokeRect(path.start.x, path.start.y, path.w, path.h); } 
             else if (path.tool === 'line') { tCtx.moveTo(path.start.x, path.start.y); tCtx.lineTo(path.end.x, path.end.y); tCtx.stroke(); }
         });

         doc.addPage([w, h], w > h ? 'l' : 'p'); doc.addImage(tempCanvas.toDataURL('image/png'), 'PNG', 0, 0, w, h);
      });
      doc.save('kselis-whiteboard.pdf');
    });

  </script>
</body>
