<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | Kselis</title>
    
    <link rel="icon" href="kselis_logo/kselis_logo_nobg_light.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&family=Cormorant+Infant:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        /* --- CORE STYLES & VARIABLES --- */
        :root {
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --text-main: #111111;
            --text-muted: #555555;
            --border-color: #eaeaea;
            --success-color: #2e7d32;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Raleway', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background: var(--card-bg); border-bottom: 1px solid var(--border-color);
        }
        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-container img { height: 45px; object-fit: contain; }
        .logo-text { font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 1.8rem; color: var(--text-main); letter-spacing: 1px; }

        /* --- MAIN CONTENT --- */
        main {
            flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px;
        }

        .status-container {
            width: 100%; max-width: 500px; background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 60px 40px; text-align: center; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.03);
        }

        .icon-circle {
            width: 80px; height: 80px; background: rgba(46, 125, 50, 0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; color: var(--success-color);
        }

        h1 { font-family: 'Cormorant Infant', serif; font-size: 3rem; margin-bottom: 12px; color: var(--text-main); }
        p { color: var(--text-muted); font-size: 1.05rem; margin-bottom: 30px; }

        .btn {
            background-color: var(--text-main); color: #fff; border: none; padding: 16px 32px;
            border-radius: 8px; font-family: 'Raleway', sans-serif; font-size: 1.05rem; font-weight: 700;
            cursor: pointer; text-decoration: none; display: inline-flex; justify-content: center; align-items: center;
            gap: 8px; transition: background 0.2s, transform 0.2s;
        }
        .btn:hover { background-color: #333; transform: translateY(-2px); }

        /* --- FOOTER --- */
        footer { text-align: center; padding: 30px 20px; background: var(--card-bg); border-top: 1px solid var(--border-color); color: var(--text-muted); font-size: 0.9rem; }
        footer a { color: var(--text-main); text-decoration: none; font-weight: 600; }
        
        @media (max-width: 768px) {
            .status-container { padding: 50px 25px; border-radius: 0; border-left: none; border-right: none; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo-container">
            <img src="kselis_logo/kselis_logo_nobg_light.png" alt="Kselis Logo">
            <span class="logo-text">KSELIS</span>
        </a>
    </nav>

    <main>
        <div class="status-container">
            <div class="icon-circle">
                <span class="material-symbols-outlined" style="font-size: 40px;">check_circle</span>
            </div>
            <h1>Message Sent</h1>
            <p>Thank you for reaching out! Your message has been successfully delivered to the Kselis team. We will get back to you as soon as possible.</p>
            
            <a href="index.html" class="btn">
                <span class="material-symbols-outlined" style="font-size: 20px;">home</span> Return to Home
            </a>
        </div>
    </main>

    <footer>
        &copy; 2024 Kselis Institute. All rights reserved | <a href="mailto:kselis.institute@gmail.com">Mail Us directly</a>
    </footer>

</body>
</html>
