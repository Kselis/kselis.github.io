<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kselis Landscape ID Card - High Res</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&family=Cormorant+Infant:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* Exact CSS Variables from the Kselis Website */
        :root {
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --text-main: #111111;
            --text-muted: #555555;
            --border-color: #eaeaea;
            --accent: #667eea;
        }

        body {
            font-family: 'Raleway', sans-serif;
            background-color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Scaled to 1011x638 Dimensions */
        .id-card {
            width: 1011px;
            height: 638px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 25px; 
            box-shadow: 0 16px 60px rgba(0, 0, 0, 0.05); 
            display: flex;
            padding: 50px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* Subtle Accent Strip on the left edge */
        .id-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 12px;
            height: 100%;
            background: var(--text-main); 
        }

        /* --- LEFT COLUMN: PHOTO & QR --- */
        .card-left {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            width: 250px;
            margin-right: 50px;
            height: 100%;
        }

        /* Passport Size Photo Box (Scaled 4:5 Ratio) */
        .passport-photo {
            width: 250px;
            height: 312px;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* SVG Placeholder for Photo */
        .passport-photo svg {
            width: 125px;
            height: 125px;
            fill: #cccccc;
        }

        /* Mini QR Code */
        .qr-box {
            width: 150px;
            height: 150px;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .qr-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: multiply; 
        }

        /* --- RIGHT COLUMN: BRANDING & DATA --- */
        .card-right {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            height: 100%;
        }

        /* Header (Logo Top Right) */
        .brand-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 25px;
            margin-bottom: 35px;
        }

        .brand-header img {
            height: 75px;
            object-fit: contain;
        }

        .logo-text {
            font-family: 'Cormorant Infant', serif;
            font-weight: 700;
            font-size: 3.3rem;
            color: var(--text-main);
            letter-spacing: 2px;
        }

        /* User Details */
        .user-info {
            display: flex;
            flex-direction: column;
            gap: 25px;
            flex-grow: 1;
            justify-content: center;
        }

        .data-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label {
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888888; 
            font-weight: 700;
        }

        .name-text {
            font-family: 'Cormorant Infant', serif;
            font-size: 4.6rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
        }

        .position-text {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Special ID Format */
        .sid-box {
            display: inline-block;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            padding: 12px 25px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
            align-self: flex-start;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="id-card">
        <div class="card-left">
            <div class="passport-photo">
                <svg viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            
            <div class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=0&color=111111&data=Verify:Prakhar-KSL-2024-001" alt="Verification QR">
            </div>
        </div>

        <div class="card-right">
            <div class="brand-header">
                <span class="logo-text">KSELIS</span>
                <img src="https://kselis.github.io/kselis_logo/kselis_logo_nobg_light.png" alt="Kselis Logo">
            </div>

            <div class="user-info">
                <div class="data-group">
                    <span class="label">Name</span>
                    <span class="name-text">Prakhar Gupta</span>
                </div>
                
                <div class="data-group">
                    <span class="label">Position</span>
                    <span class="position-text">Lead Maintainer</span>
                </div>

                <div class="data-group">
                    <span class="label">Special ID (SID)</span>
                    <span class="sid-box">KSL-2024-001</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
