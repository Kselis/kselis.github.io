
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kselis Premium ID Card</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&family=Cormorant+Infant:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        :root {
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --text-main: #111111;
            --text-muted: #555555;
            --border-color: #eaeaea;
            --accent: #667eea;
            --accent-gradient: linear-gradient(135deg, #667eea 0%, #879af0 100%);
        }

        body {
            font-family: 'Raleway', sans-serif;
            background-color: #e2e8f0; /* Darker backdrop to highlight the card */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Main Card Container */
        .id-badge {
            width: 300px;
            height: 480px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Background Watermark */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }

        /* Top Color Block */
        .badge-header {
            background: var(--accent-gradient);
            height: 160px;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            z-index: 1;
        }

        /* Lanyard Hole */
        .lanyard-hole {
            width: 60px;
            height: 12px;
            background: #e2e8f0;
            border-radius: 10px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }

        /* Logo Area */
        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-area img {
            height: 35px;
            /* Inverting the dark logo to white for the blue background */
            filter: brightness(0) invert(1); 
        }

        .logo-text {
            font-family: 'Cormorant Infant', serif;
            font-weight: 700;
            font-size: 1.6rem;
            color: #ffffff;
            letter-spacing: 2px;
        }

        /* Profile Photo */
        .profile-wrapper {
            position: absolute;
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background-color: var(--bg-color);
            border-radius: 50%;
            border: 4px solid var(--card-bg);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Badge Details */
        .badge-body {
            padding: 70px 20px 20px;
            text-align: center;
            z-index: 1;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .name {
            font-family: 'Cormorant Infant', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 5px 0;
            line-height: 1;
        }

        .role-badge {
            background: rgba(102, 126, 234, 0.1);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .department {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
            margin: 0;
        }

        /* Tech/NFC Icon */
        .nfc-icon {
            position: absolute;
            top: 180px;
            right: 20px;
            color: #ccc;
        }

        /* Footer / QR Area */
        .badge-footer {
            margin-top: auto;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .id-number-group {
            text-align: left;
        }

        .id-label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 2px 0;
        }

        .id-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
            font-family: monospace;
        }

        .qr-box {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .qr-box img {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="id-badge">
        <img src="https://kselis.github.io/kselis_logo/kselis_logo_nobg_light.png" alt="" class="watermark">

        <div class="badge-header">
            <div class="lanyard-hole"></div>
            <div class="logo-area">
                <img src="https://kselis.github.io/kselis_logo/kselis_logo_nobg_light.png" alt="Kselis Logo">
                <span class="logo-text">KSELIS</span>
            </div>
        </div>

        <div class="profile-wrapper">
            <div class="profile-img">
                <img src="https://i.pravatar.cc/300?img=11" alt="Profile Photo">
            </div>
        </div>

        <span class="material-symbols-outlined nfc-icon">contactless</span>

        <div class="badge-body">
            <h2 class="name">Prakhar Gupta</h2>
            <div class="role-badge">Lead Maintainer</div>
            <p class="department">Adminstration</p>

            <div class="badge-footer">
                <div class="id-number-group">
                    <p class="id-label">Special ID</p>
                    <p class="id-value">KSL-24-001</p>
                </div>
                <div class="qr-box">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&margin=0&data=Verify:KSL-24-001" alt="QR Code">
                </div>
            </div>
        </div>
    </div>

</body>
</html>

```
