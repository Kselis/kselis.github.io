<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Pseudocode Sandbox V2 (Patched)</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #1e1e1e; color: #ccc; }
        #editor-container { width: 60%; height: 100%; }
        #sidebar { width: 40%; display: flex; flex-direction: column; border-left: 2px solid #333; background: #252526; }
        #header { padding: 15px; background: #2d2d30; display: flex; justify-content: space-between; align-items: center; }
        #header h3 { margin: 0; color: #fff; }
        button { background: #0e639c; color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #1177bb; }
        #console { flex-grow: 1; padding: 20px; font-family: monospace; overflow-y: auto; font-size: 14px; white-space: pre-wrap; }
        .console-error { color: #f48771; }
        .console-output { margin-bottom: 4px; color: #4fc1ff; }
    </style>
</head>
<body>

<div id="editor-container"></div>
<div id="sidebar">
    <div id="header">
        <h3>Advanced Sandbox V2</h3>
        <button onclick="executePseudocode()">Run Code ▶</button>
    </div>
    <div id="console">Ready...<br><br></div>
</div>

<script>
    window.MonacoEnvironment = {
        getWorkerUrl: function(workerId, label) {
            return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
                self.MonacoEnvironment = { baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/' };
                importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs/base/worker/workerMain.js');
            `)}`;
        }
    };
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs/loader.min.js"></script>
<script>
    let editor;

    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        
        monaco.languages.register({ id: 'pseudocode' });
        monaco.languages.setMonarchTokensProvider('pseudocode', {
            tokenizer: {
                root: [
                    [/\b(IF|THEN|ELSE|ENDIF|WHILE|ENDWHILE|FOR|EACH|IN|ENDFOR|PRINT|SET|TO|CREATE|LIST|SET_DATA|TUPLE|APPEND|REMOVE|FROM)\b/, "keyword"],
                    [/[0-9]+/, "number"],
                    [/".*?"/, "string"],
                    [/'.*?$/, "comment"],
                    [/\b(TRUE|FALSE)\b/, "constant.language"]
                ]
            }
        });

        monaco.editor.defineTheme('pseudoTheme', {
            base: 'vs-dark',
            inherit: true,
            rules: [
                { token: 'keyword', foreground: 'c586c0', fontStyle: 'bold' },
                { token: 'string', foreground: 'ce9178' },
                { token: 'number', foreground: 'b5cea8' },
                { token: 'comment', foreground: '6a9955', fontStyle: 'italic' },
                { token: 'constant.language', foreground: '569cd6' }
            ]
        });

        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: [
                "' --- 1. LISTS (Mutable Arrays) ---",
                "CREATE LIST users = [\"Alice\", \"Bob\"]",
                "APPEND \"Charlie\" TO users",
                "PRINT \"List: \" + users",
                "",
                "' --- 2. SETS (Unique Values Only) ---",
                "CREATE SET_DATA ids = [101, 102, 101, 103]",
                "APPEND 104 TO ids",
                "PRINT \"Set: \" + ids",
                "",
                "' --- 3. TUPLES (Immutable Arrays) ---",
                "CREATE TUPLE coordinates = (45.5, -122.6)",
                "PRINT \"Tuple: \" + coordinates",
                "",
                "' --- 4. Iterating ---",
                "FOR EACH user IN users",
                "    PRINT \"Greeting: Hello \" + user",
                "ENDFOR"
            ].join('\n'),
            language: 'pseudocode',
            theme: 'pseudoTheme',
            automaticLayout: true,
            fontSize: 16
        });
    });

    function executePseudocode() {
        const code = editor.getValue();
        const consoleDiv = document.getElementById('console');
        consoleDiv.innerHTML = ""; 
        let jsCode = code;
        
        jsCode = jsCode.replace(/'(.*)$/gm, ''); 
        jsCode = jsCode.replace(/\bSET\b\s+([a-zA-Z_]\w*)\s+\bTO\b/g, 'let $1 ='); 
        jsCode = jsCode.replace(/\bCREATE\s+LIST\s+([a-zA-Z_]\w*)\s*=\s*(\[.*?\])/g, 'let $1 = $2;');
        jsCode = jsCode.replace(/\bCREATE\s+SET_DATA\s+([a-zA-Z_]\w*)\s*=\s*(\[.*?\])/g, 'let $1 = new Set($2);');
        jsCode = jsCode.replace(/\bCREATE\s+TUPLE\s+([a-zA-Z_]\w*)\s*=\s*\((.*?)\)/g, 'let $1 = Object.freeze([$2]);');
        jsCode = jsCode.replace(/\bAPPEND\s+(.*?)\s+TO\s+([a-zA-Z_]\w*)/g, 'if($2.push){$2.push($1)}else if($2.add){$2.add($1)};');
        jsCode = jsCode.replace(/\bREMOVE\s+(.*?)\s+FROM\s+([a-zA-Z_]\w*)/g, 'if($2.delete){$2.delete($1)}else if($2.indexOf){let idx=$2.indexOf($1);if(idx>-1)$2.splice(idx,1)};');
        jsCode = jsCode.replace(/\bFOR\s+EACH\s+([a-zA-Z_]\w*)\s+IN\s+([a-zA-Z_]\w*)/g, 'for(let $1 of $2) {');
        jsCode = jsCode.replace(/\bENDFOR\b/g, '}');
        jsCode = jsCode.replace(/\bPRINT\b\s+(.*)$/gm, 'safePrint($1);'); 
        jsCode = jsCode.replace(/\bWHILE\b\s+(.*)$/gm, 'while ($1) {'); 
        jsCode = jsCode.replace(/\bENDWHILE\b/g, '}'); 
        jsCode = jsCode.replace(/\bIF\b\s+(.*)\s+\bTHEN\b/g, 'if ($1) {'); 
        jsCode = jsCode.replace(/\bELSE\b/g, '} else {'); 
        jsCode = jsCode.replace(/\bENDIF\b/g, '}'); 

        const safePrint = (msg) => {
            const line = document.createElement('div');
            line.className = 'console-output';
            if (msg instanceof Set) {
                line.textContent = "{" + Array.from(msg).join(", ") + "}";
            } else if (Array.isArray(msg)) {
                if(Object.isFrozen(msg)) {
                    line.textContent = "(" + msg.join(", ") + ")";
                } else {
                    line.textContent = "[" + msg.join(", ") + "]";
                }
            } else {
                line.textContent = msg;
            }
            consoleDiv.appendChild(line);
        };

        try {
            const execute = new Function('safePrint', jsCode);
            execute(safePrint);
            if(consoleDiv.innerHTML === "") safePrint("✅ Executed successfully.");
        } catch (error) {
            const errLine = document.createElement('div');
            errLine.className = 'console-error';
            errLine.textContent = "Runtime Error: " + error.message;
            consoleDiv.appendChild(errLine);
        }
    }
</script>
</body>
</html>
