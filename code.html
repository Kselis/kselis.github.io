<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kselis Pseudocode Editor</title>

<!-- Load Pre-bundled CodeMirror 5 (Works without server/modules) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/darcula.min.css">
<!-- Simple JS mode for basic coloring -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>

<style>
    :root {
        --bg-main: #1e1e1e;
        --bg-panel: #252526;
        --bg-input: #3c3c3c;
        --text-main: #cccccc;
        --text-muted: #858585;
        --accent: #007acc;
        --accent-hover: #0098ff;
        --error: #f48771;
        --success: #89d185;
        --border: #3c3c3c;
        --font-mono: 'Consolas', 'Courier New', monospace;
        --font-sans: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        background-color: var(--bg-main);
        color: var(--text-main);
        font-family: var(--font-sans);
        line-height: 1.5;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .sandbox-container {
        display: grid;
        grid-template-columns: 2fr 1fr;
        grid-template-rows: 2fr 1fr;
        gap: 1px;
        background-color: var(--border);
        height: 100vh;
        width: 100vw;
    }

    .panel {
        background-color: var(--bg-panel);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .panel-header {
        background-color: #2d2d2d;
        padding: 8px 16px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border);
    }

    .toolbar {
        display: flex;
        gap: 8px;
    }

    button {
        background-color: var(--bg-input);
        color: var(--text-main);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 12px;
        font-size: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.2s;
    }

    button:hover {
        background-color: var(--accent);
        border-color: var(--accent);
        color: #fff;
    }

    button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background-color: var(--bg-input) !important;
        border-color: var(--border) !important;
    }

    .run-btn { background-color: var(--accent); color: #fff; border-color: var(--accent); }
    
    .editor-container {
        flex-grow: 1;
        overflow: hidden; /* Changed for CM5 */
        position: relative;
        display: flex;
        flex-direction: column;
    }

    /* CodeMirror Overrides */
    .CodeMirror {
        height: 100%;
        flex-grow: 1;
        font-family: var(--font-mono) !important;
        font-size: 14px;
    }

    .variables-panel {
        grid-column: 2;
        grid-row: 1;
    }

    .variables-content {
        padding: 16px;
        font-family: var(--font-mono);
        font-size: 13px;
        overflow-y: auto;
        flex-grow: 1;
    }

    .var-row {
        display: flex;
        margin-bottom: 8px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 4px;
    }

    .var-name {
        color: #9cdcfe;
        width: 40%;
        font-weight: bold;
    }

    .var-value {
        color: #ce9178;
        width: 60%;
        word-break: break-all;
    }
    
    .var-value.number { color: #b5cea8; }
    .var-value.boolean { color: #569cd6; }
    .var-value.collection { color: #dcdcaa; }

    .terminal-panel {
        grid-column: 1 / span 2;
        grid-row: 2;
    }

    .terminal-content {
        padding: 16px;
        font-family: var(--font-mono);
        font-size: 13px;
        overflow-y: auto;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
    }

    .term-line {
        margin-bottom: 4px;
        white-space: pre-wrap;
    }

    .term-error { color: var(--error); }
    .term-success { color: var(--success); }
    .term-system { color: var(--text-muted); font-style: italic; }

    .term-input-line {
        display: flex;
        align-items: center;
        margin-top: 4px;
    }

    .term-prompt {
        color: var(--accent);
        margin-right: 8px;
    }

    .term-input {
        background: transparent;
        border: none;
        color: var(--text-main);
        font-family: var(--font-mono);
        font-size: 13px;
        flex-grow: 1;
        outline: none;
    }

    .hidden { display: none !important; }

    /* Embed Mode Overrides */
    .pseudo-sandbox {
        display: none; 
    }
    .embedded-sandbox {
        height: 500px;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        margin: 16px 0;
    }

    /* Debugger Active Line Highlight */
    .active-line {
        background-color: rgba(100, 149, 237, 0.3) !important; /* Soft blue */
    }

    /* Mobile Layout */
    @media (max-width: 768px) {
        .sandbox-container {
            display: flex;
            flex-direction: column;
        }
        .panel {
            flex: none;
            border-bottom: 1px solid var(--border);
        }
        .editor-panel { height: 40vh; }
        .variables-panel { height: 25vh; }
        .terminal-panel { height: 35vh; }
    }
</style>
</head>
<body>

<div id="app" class="sandbox-container">
    <!-- Editor Panel -->
    <div class="panel editor-panel">
        <div class="panel-header">
            <span>Editor</span>
            <div class="toolbar">
                <button id="btn-run" class="run-btn">▶ Run</button>
                <button id="btn-step">⏭ Step</button>
                <button id="btn-reset">🔄 Reset</button>
            </div>
        </div>
        <div id="editor" class="editor-container"></div>
    </div>

    <!-- Variables Panel -->
    <div class="panel variables-panel">
        <div class="panel-header"><span>{ } Variables</span></div>
        <div id="variables" class="variables-content">
            <div class="term-system">No variables defined yet.</div>
        </div>
    </div>

    <!-- Terminal Panel -->
    <div class="panel terminal-panel">
        <div class="panel-header"><span>>_ Terminal</span></div>
        <div id="terminal" class="terminal-content">
            <div class="term-system">Sandbox initialized. Ready.</div>
        </div>
    </div>
</div>

<script>
// ==========================================
// 1. LEXER
// ==========================================

const TokenType = {
    KEYWORD: 'KEYWORD',
    IDENTIFIER: 'IDENTIFIER',
    NUMBER: 'NUMBER',
    STRING: 'STRING',
    OPERATOR: 'OPERATOR',
    PUNCTUATION: 'PUNCTUATION',
    EOF: 'EOF'
};

const Keywords = new Set([
    'SET', 'TO', 'PRINT', 'IF', 'THEN', 'ELSE', 'ENDIF',
    'WHILE', 'ENDWHILE', 'FOR', 'EACH', 'IN', 'ENDFOR',
    'CREATE', 'LIST', 'SET_DATA', 'TUPLE', 'APPEND', 'REMOVE', 'FROM',
    'INPUT_TEXT', 'INPUT_NUM', 'AND', 'OR'
]);

const Operators = ['+', '-', '*', '/', '%', '<=', '>=', '==', '!=', '<', '>'];

class Lexer {
    constructor(input) {
        this.input = input;
        this.pos = 0;
        this.line = 1;
        this.col = 1;
    }

    advance() {
        if (this.pos >= this.input.length) return null;
        const char = this.input[this.pos++];
        if (char === '\n') { this.line++; this.col = 1; } 
        else { this.col++; }
        return char;
    }

    peek(offset = 0) {
        if (this.pos + offset >= this.input.length) return null;
        return this.input[this.pos + offset];
    }

    skipWhitespace() {
        while (this.peek() && /\s/.test(this.peek())) this.advance();
    }

    tokenize() {
        const tokens = [];
        while (this.pos < this.input.length) {
            this.skipWhitespace();
            if (this.pos >= this.input.length) break;

            const char = this.peek();
            
            // Strings
            if (char === '"' || char === "'") {
                tokens.push(this.readString(this.advance()));
                continue;
            }

            // Numbers
            if (/[0-9]/.test(char)) {
                tokens.push(this.readNumber());
                continue;
            }

            // Identifiers and Keywords
            if (/[a-zA-Z_]/.test(char)) {
                tokens.push(this.readIdentifier());
                continue;
            }

            // Operators (2 chars)
            const twoCharOp = char + (this.peek(1) || '');
            if (Operators.includes(twoCharOp)) {
                tokens.push({ type: TokenType.OPERATOR, value: twoCharOp, line: this.line });
                this.advance(); this.advance();
                continue;
            }

            // Operators (1 char)
            if (Operators.includes(char)) {
                tokens.push({ type: TokenType.OPERATOR, value: char, line: this.line });
                this.advance();
                continue;
            }

            // Punctuation
            if (/[(),[\]{}]/.test(char)) {
                tokens.push({ type: TokenType.PUNCTUATION, value: char, line: this.line });
                this.advance();
                continue;
            }

            throw new Error(`Lexer Error: Unexpected character '${char}' at line ${this.line}`);
        }
        tokens.push({ type: TokenType.EOF, value: null, line: this.line });
        return tokens;
    }

    readString(quote) {
        let value = '';
        let startLine = this.line;
        while (this.peek() && this.peek() !== quote) {
            value += this.advance();
        }
        if (this.peek() !== quote) throw new Error(`Lexer Error: Unterminated string at line ${startLine}`);
        this.advance(); // consume closing quote
        return { type: TokenType.STRING, value, line: startLine };
    }

    readNumber() {
        let value = '';
        while (this.peek() && /[0-9.]/.test(this.peek())) {
            value += this.advance();
        }
        return { type: TokenType.NUMBER, value: parseFloat(value), line: this.line };
    }

    readIdentifier() {
        let value = '';
        while (this.peek() && /[a-zA-Z0-9_]/.test(this.peek())) {
            value += this.advance();
        }
        const upper = value.toUpperCase();
        if (Keywords.has(upper)) {
            return { type: TokenType.KEYWORD, value: upper, line: this.line };
        }
        return { type: TokenType.IDENTIFIER, value, line: this.line };
    }
}

// ==========================================
// 2. PARSER
// ==========================================

class Parser {
    constructor(tokens) {
        this.tokens = tokens;
        this.pos = 0;
    }

    peek() { return this.tokens[this.pos]; }
    previous() { return this.tokens[this.pos - 1]; }
    isAtEnd() { return this.peek().type === TokenType.EOF; }

    advance() {
        if (!this.isAtEnd()) this.pos++;
        return this.previous();
    }

    matchType(type) {
        if (this.peek().type === type) { this.advance(); return true; }
        return false;
    }

    matchKeyword(kw) {
        if (this.peek().type === TokenType.KEYWORD && this.peek().value === kw) {
            this.advance(); return true;
        }
        return false;
    }

    // NEW FIX: Only consume the operator if it matches the exact ones we are looking for
    matchOp(ops) {
        if (this.peek().type === TokenType.OPERATOR && ops.includes(this.peek().value)) {
            this.advance(); 
            return true;
        }
        return false;
    }

    consumeType(type, errMsg) {
        if (this.matchType(type)) return this.previous();
        throw new Error(`Parse Error (Line ${this.peek().line}): ${errMsg} - found ${this.peek().value}`);
    }

    consumeKeyword(kw, errMsg) {
        if (this.matchKeyword(kw)) return this.previous();
        throw new Error(`Parse Error (Line ${this.peek().line}): ${errMsg} - found ${this.peek().value}`);
    }

    parse() {
        const statements = [];
        while (!this.isAtEnd()) {
            statements.push(this.parseStatement());
        }
        return { type: 'Program', body: statements };
    }

    parseStatement() {
        // Capture the line number of the start of the statement
        const line = this.peek().line; 
        
        let stmt;
        if (this.matchKeyword('SET')) stmt = this.parseSet();
        else if (this.matchKeyword('PRINT')) stmt = this.parsePrint();
        else if (this.matchKeyword('IF')) stmt = this.parseIf();
        else if (this.matchKeyword('WHILE')) stmt = this.parseWhile();
        else if (this.matchKeyword('FOR')) stmt = this.parseFor();
        else if (this.matchKeyword('APPEND')) stmt = this.parseAppend();
        else if (this.matchKeyword('REMOVE')) stmt = this.parseRemove();
        else {
            const expr = this.parseExpression();
            stmt = { type: 'ExpressionStatement', expression: expr };
        }
        
        // Attach line to the generated statement
        stmt.line = line; 
        return stmt;
    }

    parseSet() {
        const id = this.consumeType(TokenType.IDENTIFIER, "Expected variable name after SET").value;
        this.consumeKeyword('TO', "Expected 'TO' after variable name in SET statement");
        const value = this.parseExpression();
        return { type: 'SetStatement', identifier: id, value };
    }

    parsePrint() {
        return { type: 'PrintStatement', expression: this.parseExpression() };
    }

    parseIf() {
        const condition = this.parseExpression();
        this.consumeKeyword('THEN', "Expected 'THEN' after IF condition");
        const consequent = [];
        while (!this.isAtEnd() && this.peek().value !== 'ELSE' && this.peek().value !== 'ENDIF') {
            consequent.push(this.parseStatement());
        }
        let alternate = [];
        if (this.matchKeyword('ELSE')) {
            while (!this.isAtEnd() && this.peek().value !== 'ENDIF') {
                alternate.push(this.parseStatement());
            }
        }
        this.consumeKeyword('ENDIF', "Expected 'ENDIF' to close IF statement");
        return { type: 'IfStatement', condition, consequent, alternate };
    }

    parseWhile() {
        const condition = this.parseExpression();
        const body = [];
        while (!this.isAtEnd() && this.peek().value !== 'ENDWHILE') {
            body.push(this.parseStatement());
        }
        this.consumeKeyword('ENDWHILE', "Expected 'ENDWHILE' to close WHILE statement");
        return { type: 'WhileStatement', condition, body };
    }

    parseFor() {
        this.consumeKeyword('EACH', "Expected 'EACH' after FOR");
        const iterator = this.consumeType(TokenType.IDENTIFIER, "Expected iterator variable name").value;
        this.consumeKeyword('IN', "Expected 'IN' after iterator");
        const collection = this.parseExpression();
        const body = [];
        while (!this.isAtEnd() && this.peek().value !== 'ENDFOR') {
            body.push(this.parseStatement());
        }
        this.consumeKeyword('ENDFOR', "Expected 'ENDFOR' to close FOR loop");
        return { type: 'ForStatement', iterator, collection, body };
    }

    parseAppend() {
        const item = this.parseExpression();
        this.consumeKeyword('TO', "Expected 'TO' in APPEND statement");
        const collection = this.consumeType(TokenType.IDENTIFIER, "Expected collection name after TO").value;
        return { type: 'AppendStatement', item, collection };
    }

    parseRemove() {
        const item = this.parseExpression();
        this.consumeKeyword('FROM', "Expected 'FROM' in REMOVE statement");
        const collection = this.consumeType(TokenType.IDENTIFIER, "Expected collection name after FROM").value;
        return { type: 'RemoveStatement', item, collection };
    }

    parseExpression() {
        return this.parseLogical();
    }

    parseLogical() {
        let left = this.parseEquality();
        while (this.matchKeyword('AND') || this.matchKeyword('OR')) {
            const op = this.previous().value;
            const right = this.parseEquality();
            left = { type: 'BinaryExpression', operator: op, left, right };
        }
        return left;
    }

    parseEquality() {
        let left = this.parseComparison();
        while (this.matchOp(['==', '!='])) {
            const op = this.previous().value;
            const right = this.parseComparison();
            left = { type: 'BinaryExpression', operator: op, left, right };
        }
        return left;
    }

    parseComparison() {
        let left = this.parseTerm();
        while (this.matchOp(['<', '<=', '>', '>='])) {
            const op = this.previous().value;
            const right = this.parseTerm();
            left = { type: 'BinaryExpression', operator: op, left, right };
        }
        return left;
    }

    parseTerm() {
        let left = this.parseFactor();
        while (this.matchOp(['+', '-'])) {
            const op = this.previous().value;
            const right = this.parseFactor();
            left = { type: 'BinaryExpression', operator: op, left, right };
        }
        return left;
    }

    parseFactor() {
        let left = this.parsePrimary();
        while (this.matchOp(['*', '/', '%'])) {
            const op = this.previous().value;
            const right = this.parsePrimary();
            left = { type: 'BinaryExpression', operator: op, left, right };
        }
        return left;
    }

    parsePrimary() {
        if (this.matchType(TokenType.NUMBER)) return { type: 'Literal', value: this.previous().value, dataType: 'Number' };
        if (this.matchType(TokenType.STRING)) return { type: 'Literal', value: this.previous().value, dataType: 'String' };
        
        if (this.matchKeyword('CREATE')) {
            if (this.matchKeyword('LIST')) return { type: 'CreateCollection', collectionType: 'List' };
            if (this.matchKeyword('SET_DATA')) return { type: 'CreateCollection', collectionType: 'Set' };
            if (this.matchKeyword('TUPLE')) return { type: 'CreateCollection', collectionType: 'Tuple' };
            throw new Error(`Parse Error (Line ${this.peek().line}): Unknown collection type after CREATE`);
        }

        if (this.matchKeyword('INPUT_TEXT') || this.matchKeyword('INPUT_NUM')) {
            const type = this.previous().value;
            this.consumeType(TokenType.PUNCTUATION, "Expected '(' after " + type);
            const promptStr = this.consumeType(TokenType.STRING, "Expected prompt string").value;
            this.consumeType(TokenType.PUNCTUATION, "Expected ')' after prompt");
            return { type: 'InputExpression', inputType: type, prompt: promptStr };
        }

        if (this.matchType(TokenType.IDENTIFIER)) return { type: 'Identifier', name: this.previous().value };
        
        // Use peek here to avoid eagerly consuming non-parenthesis punctuation
        if (this.peek().type === TokenType.PUNCTUATION && this.peek().value === '(') {
            this.advance();
            const expr = this.parseExpression();
            this.consumeType(TokenType.PUNCTUATION, "Expected ')'");
            return expr;
        }

        throw new Error(`Parse Error (Line ${this.peek().line}): Unexpected token ${this.peek().value}`);
    }
}
// ==========================================
// 3. INTERPRETER & ENVIRONMENT
// ==========================================

class Environment {
    constructor() {
        this.vars = new Map();
    }
    set(name, value, type) {
        this.vars.set(name, { value, type });
        updateVariablesUI(this);
    }
    get(name) {
        if (!this.vars.has(name)) throw new Error(`Undefined variable: ${name}`);
        return this.vars.get(name);
    }
}

class Interpreter {
    constructor(ast, env, onOutput, onInput) {
        this.ast = ast;
        this.env = env;
        this.onOutput = onOutput;
        this.onInput = onInput;
        this.stepCount = 0;
        this.MAX_STEPS = 10000;
        
        // Generator for stepping
        this.execGen = this.executeBlock(this.ast.body);
    }

async runAll() {
        let result = this.execGen.next();
        while (!result.done) {
            if (result.value instanceof Promise) {
                const userInput = await result.value;
                result = this.execGen.next(userInput);
            } else {
                // Skip past AST node yields during full run
                result = this.execGen.next();
            }
        }
    }

    async step() {
        let result = this.execGen.next();
        
        while (!result.done) {
            if (result.value instanceof Promise) {
                const userInput = await result.value;
                result = this.execGen.next(userInput);
            } else {
                // Yielded an AST Node - return its line number for highlighting!
                return { done: false, line: result.value.line }; 
            }
        }
        return { done: true }; 
    }

    *executeBlock(statements) {
        for (const stmt of statements) {
            yield stmt; // Yield point BEFORE execution for highlighting
            
            yield* this.executeStatement(stmt);
            
            this.stepCount++;
            if (this.stepCount > this.MAX_STEPS) {
                throw new Error("Possible infinite loop detected.");
            }
        }
    }
    *executeStatement(stmt) {
        switch (stmt.type) {
            case 'SetStatement': {
                const valObj = yield* this.evaluate(stmt.value);
                this.env.set(stmt.identifier, valObj.value, valObj.type);
                break;
            }
            case 'PrintStatement': {
                const valObj = yield* this.evaluate(stmt.expression);
                let out = valObj.value;
                if (valObj.type === 'List' || valObj.type === 'Tuple') {
                    out = `[${valObj.value.join(', ')}]`;
                } else if (valObj.type === 'Set') {
                    out = `{${Array.from(valObj.value).join(', ')}}`;
                }
                this.onOutput(out.toString());
                break;
            }
            case 'IfStatement': {
                const cond = yield* this.evaluate(stmt.condition);
                if (cond.value) {
                    yield* this.executeBlock(stmt.consequent);
                } else {
                    yield* this.executeBlock(stmt.alternate);
                }
                break;
            }
            case 'WhileStatement': {
                while (true) {
                    const cond = yield* this.evaluate(stmt.condition);
                    if (!cond.value) break;
                    yield* this.executeBlock(stmt.body);
                }
                break;
            }
            case 'ForStatement': {
                const colObj = yield* this.evaluate(stmt.collection);
                let items = [];
                if (colObj.type === 'List' || colObj.type === 'Tuple') items = colObj.value;
                else if (colObj.type === 'Set') items = Array.from(colObj.value);
                else throw new Error(`Cannot iterate over type ${colObj.type}`);

                for (const item of items) {
                    let itemType = typeof item === 'number' ? 'Number' : (typeof item === 'string' ? 'String' : 'Unknown');
                    this.env.set(stmt.iterator, item, itemType);
                    yield* this.executeBlock(stmt.body);
                }
                break;
            }
            case 'AppendStatement': {
                const itemObj = yield* this.evaluate(stmt.item);
                const col = this.env.get(stmt.collection);
                if (col.type === 'List') {
                    col.value.push(itemObj.value);
                } else if (col.type === 'Set') {
                    col.value.add(itemObj.value);
                } else {
                    throw new Error(`Cannot APPEND to type ${col.type}`);
                }
                this.env.set(stmt.collection, col.value, col.type);
                break;
            }
            case 'RemoveStatement': {
                const itemObj = yield* this.evaluate(stmt.item);
                const col = this.env.get(stmt.collection);
                if (col.type === 'List') {
                    const idx = col.value.indexOf(itemObj.value);
                    if (idx > -1) col.value.splice(idx, 1);
                } else if (col.type === 'Set') {
                    col.value.delete(itemObj.value);
                } else {
                    throw new Error(`Cannot REMOVE from type ${col.type}`);
                }
                this.env.set(stmt.collection, col.value, col.type);
                break;
            }
            case 'ExpressionStatement': {
                yield* this.evaluate(stmt.expression);
                break;
            }
        }
    }

    *evaluate(expr) {
        switch (expr.type) {
            case 'Literal':
                return { value: expr.value, type: expr.dataType };
            case 'Identifier':
                return this.env.get(expr.name);
            case 'CreateCollection':
                if (expr.collectionType === 'List') return { value: [], type: 'List' };
                if (expr.collectionType === 'Set') return { value: new Set(), type: 'Set' };
                if (expr.collectionType === 'Tuple') return { value: [], type: 'Tuple' };
            case 'InputExpression': {
                const userInput = yield this.onInput(expr.prompt); // Suspend execution waiting for promise
                if (expr.inputType === 'INPUT_NUM') {
                    const num = parseFloat(userInput);
                    if (isNaN(num)) throw new Error("Input must be a number");
                    return { value: num, type: 'Number' };
                }
                return { value: userInput, type: 'String' };
            }
            case 'BinaryExpression': {
                const leftObj = yield* this.evaluate(expr.left);
                const rightObj = yield* this.evaluate(expr.right);
                const l = leftObj.value, r = rightObj.value;

                switch (expr.operator) {
                    case '+': return { value: l + r, type: (leftObj.type==='Number'?'Number':'String') };
                    case '-': return { value: l - r, type: 'Number' };
                    case '*': return { value: l * r, type: 'Number' };
                    case '/': return { value: l / r, type: 'Number' };
                    case '%': return { value: l % r, type: 'Number' };
                    case '==': return { value: l === r, type: 'Boolean' };
                    case '!=': return { value: l !== r, type: 'Boolean' };
                    case '<': return { value: l < r, type: 'Boolean' };
                    case '<=': return { value: l <= r, type: 'Boolean' };
                    case '>': return { value: l > r, type: 'Boolean' };
                    case '>=': return { value: l >= r, type: 'Boolean' };
                    case 'AND': return { value: l && r, type: 'Boolean' };
                    case 'OR': return { value: l || r, type: 'Boolean' };
                }
            }
        }
        throw new Error(`Unknown expression type: ${expr.type}`);
    }
}

// ==========================================
// 4. UI AND RUNTIME INTEGRATION
// ==========================================

let activeInterpreter = null;
let activeEnv = null;
let mainEditor;
const terminalEl = document.getElementById('terminal');
const variablesEl = document.getElementById('variables');

function printTerminal(msg, type = '') {
    const line = document.createElement('div');
    line.className = `term-line ${type ? 'term-' + type : ''}`;
    line.textContent = msg;
    terminalEl.appendChild(line);
    terminalEl.scrollTop = terminalEl.scrollHeight;
}

function clearTerminal() {
    terminalEl.innerHTML = '<div class="term-system">Sandbox initialized. Ready.</div>';
}

function updateVariablesUI(env) {
    if (env.vars.size === 0) {
        variablesEl.innerHTML = '<div class="term-system">No variables defined.</div>';
        return;
    }
    variablesEl.innerHTML = '';
    for (const [key, v] of env.vars.entries()) {
        const row = document.createElement('div');
        row.className = 'var-row';
        
        const name = document.createElement('div');
        name.className = 'var-name';
        name.textContent = key;
        
        const val = document.createElement('div');
        val.className = `var-value ${v.type.toLowerCase()}`;
        
        if (v.type === 'List' || v.type === 'Tuple') val.textContent = `[${v.value.join(', ')}]`;
        else if (v.type === 'Set') val.textContent = `{${Array.from(v.value).join(', ')}}`;
        else if (v.type === 'String') val.textContent = `"${v.value}"`;
        else val.textContent = v.value;

        row.appendChild(name);
        row.appendChild(val);
        variablesEl.appendChild(row);
    }
}

let activeLineMarker = null;

function highlightLine(lineNum) {
    // Remove existing highlight
    if (activeLineMarker !== null) {
        mainEditor.removeLineClass(activeLineMarker, "background", "active-line");
    }
    // Add new highlight (CodeMirror lines are 0-indexed)
    if (lineNum !== null && lineNum > 0) {
        activeLineMarker = lineNum - 1; 
        mainEditor.addLineClass(activeLineMarker, "background", "active-line");
    }
}

function requestInput(promptMsg) {
    return new Promise((resolve) => {
        const line = document.createElement('div');
        line.className = 'term-input-line';
        
        const promptLabel = document.createElement('span');
        promptLabel.className = 'term-prompt';
        promptLabel.textContent = promptMsg + " >";
        
        const inputField = document.createElement('input');
        inputField.type = 'text';
        inputField.className = 'term-input';
        
        line.appendChild(promptLabel);
        line.appendChild(inputField);
        terminalEl.appendChild(line);
        inputField.focus();

        inputField.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const val = inputField.value;
                inputField.disabled = true;
                resolve(val);
            }
        });
    });
}

function setupExecution() {
    clearTerminal();
    activeEnv = new Environment();
    updateVariablesUI(activeEnv);
    
    // Use standard CodeMirror getter
    const code = mainEditor.getValue();
    try {
        const lexer = new Lexer(code);
        const tokens = lexer.tokenize();
        const parser = new Parser(tokens);
        const ast = parser.parse();
        
        activeInterpreter = new Interpreter(ast, activeEnv, printTerminal, requestInput);
        return true;
    } catch (e) {
        printTerminal(e.message, 'error');
        activeInterpreter = null;
        return false;
    }
}

let isRunning = false;

function setControlsDisabled(disabled) {
    document.getElementById('btn-run').disabled = disabled;
    document.getElementById('btn-step').disabled = disabled;
}

document.getElementById('btn-run').addEventListener('click', async () => {
    if (isRunning) return;
    if (!activeInterpreter) {
        if (!setupExecution()) return;
    }

    isRunning = true;
    setControlsDisabled(true);
    highlightLine(null); // Clear highlights during full run
    
    try {
        await activeInterpreter.runAll();
        printTerminal("Program finished.", "success");
        activeInterpreter = null;
    } catch (e) {
        printTerminal("Runtime Error: " + e.message, "error");
        activeInterpreter = null;
    }
    
    isRunning = false;
    setControlsDisabled(false);
});

document.getElementById('btn-step').addEventListener('click', async () => {
    if (isRunning) return;

    if (!activeInterpreter) {
        if (!setupExecution()) return;
        printTerminal("Stepping started...", "system");
    }
    
    isRunning = true;
    setControlsDisabled(true);
    
    try {
        const stepResult = await activeInterpreter.step();
        if (stepResult.done) {
            printTerminal("Program finished.", "success");
            highlightLine(null);
            activeInterpreter = null;
        } else {
            // Highlight the line that is about to execute!
            highlightLine(stepResult.line);
        }
    } catch (e) {
        printTerminal("Runtime Error: " + e.message, "error");
        highlightLine(null);
        activeInterpreter = null;
    }
    
    isRunning = false;
    setControlsDisabled(false);
});

document.getElementById('btn-reset').addEventListener('click', () => {
    clearTerminal();
    activeEnv = new Environment();
    updateVariablesUI(activeEnv);
    activeInterpreter = null;
    
    // Unlock everything and clear highlights
    highlightLine(null);
    isRunning = false;
    setControlsDisabled(false);
});
// ==========================================
// 5. INITIALIZE CODEMIRROR 5
// ==========================================

const defaultCode = 
`SET name TO INPUT_TEXT("What is your name?")
PRINT "Hello, " + name

SET nums TO CREATE LIST
APPEND 10 TO nums
APPEND 20 TO nums

SET total TO 0
FOR EACH n IN nums
    SET total TO total + n
ENDFOR

PRINT "Total: " + total

IF total > 20 THEN
    PRINT "Big number!"
ELSE
    PRINT "Small number!"
ENDIF
`;

document.addEventListener("DOMContentLoaded", () => {
    // Initialize main editor
    mainEditor = CodeMirror(document.getElementById('editor'), {
        value: defaultCode,
        mode: "javascript", // Gives us basic syntax highlighting
        theme: "darcula",
        lineNumbers: true,
        indentUnit: 4,
        viewportMargin: Infinity
    });

    // ==========================================
    // 6. EMBEDDABLE MODE INITIALIZATION
    // ==========================================
    const embeds = document.querySelectorAll('.pseudo-sandbox');
    embeds.forEach((el, index) => {
        const code = el.textContent.trim();
        
        // Create container for embed
        const container = document.createElement('div');
        container.className = 'sandbox-container embedded-sandbox';
        
        // Create internal structure similar to main app
        container.innerHTML = `
            <div class="panel editor-panel">
                <div class="panel-header">
                    <span>Editor</span>
                    <div class="toolbar">
                        <button class="embed-run run-btn">▶ Run</button>
                    </div>
                </div>
                <div class="embed-editor editor-container"></div>
            </div>
            <div class="panel variables-panel hidden"></div>
            <div class="panel terminal-panel">
                <div class="panel-header"><span>>_ Terminal</span></div>
                <div class="embed-terminal terminal-content"></div>
            </div>
        `;
        
        el.parentNode.replaceChild(container, el);
        
        const edNode = container.querySelector('.embed-editor');
        const termNode = container.querySelector('.embed-terminal');
        const runBtn = container.querySelector('.embed-run');
        
        const embedEditor = CodeMirror(edNode, {
            value: code,
            mode: "javascript",
            theme: "darcula",
            lineNumbers: true
        });

        runBtn.addEventListener('click', async () => {
            termNode.innerHTML = '';
            const embedEnv = new Environment(); 
            
            const printFn = (msg) => {
                const line = document.createElement('div');
                line.className = 'term-line';
                line.textContent = msg;
                termNode.appendChild(line);
                termNode.scrollTop = termNode.scrollHeight;
            };

            const inputFn = (promptMsg) => new Promise((resolve) => {
                const line = document.createElement('div');
                line.className = 'term-input-line';
                const promptLabel = document.createElement('span');
                promptLabel.className = 'term-prompt';
                promptLabel.textContent = promptMsg + " >";
                const inputField = document.createElement('input');
                inputField.type = 'text';
                inputField.className = 'term-input';
                line.appendChild(promptLabel);
                line.appendChild(inputField);
                termNode.appendChild(line);
                inputField.focus();

                inputField.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        inputField.disabled = true;
                        resolve(inputField.value);
                    }
                });
            });

            try {
                // Get code using CM5 method
                const lex = new Lexer(embedEditor.getValue());
                const ast = new Parser(lex.tokenize()).parse();
                const interpreter = new Interpreter(ast, embedEnv, printFn, inputFn);
                await interpreter.runAll();
                const doneMsg = document.createElement('div');
                doneMsg.className = 'term-line term-success';
                doneMsg.textContent = "Finished.";
                termNode.appendChild(doneMsg);
            } catch(e) {
                const errMsg = document.createElement('div');
                errMsg.className = 'term-line term-error';
                errMsg.textContent = "Error: " + e.message;
                termNode.appendChild(errMsg);
            }
        });
    });
});
</script>
