<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Kselis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&family=Cormorant+Infant:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* Base body styling with the modern dot grid */
        body {
            font-family: 'Raleway', sans-serif;
            margin: 0;
            background-color: #fafafa;
            background-image: radial-gradient(#d5d5d5 1px, transparent 1px);
            background-size: 24px 24px;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Navbar matching the Kselis homepage */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid #eaeaea;
            backdrop-filter: blur(8px);
        }
        
        .nav-logo {
            font-family: 'Cormorant Infant', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #111;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 1px;
        }
        
        .nav-links {
            display: flex;
            gap: 24px;
        }
        
        .nav-link {
            text-decoration: none;
            color: #444;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        
        .nav-link:hover { color: #111; }

        /* Centered 404 Card Layout */
        .error-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .error-card {
            background: #ffffff;
            padding: 60px 80px;
            border-radius: 12px;
            border: 1px solid #eaeaea;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            text-align: center;
            max-width: 450px;
        }

        .error-code {
            font-family: 'Cormorant Infant', serif;
            font-size: 7rem;
            font-weight: 700;
            color: #111;
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
        }

        .error-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 16px 0;
            color: #333;
        }

        .error-text {
            color: #666;
            line-height: 1.7;
            margin-bottom: 36px;
            font-size: 1.05rem;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #222;
            color: #fff;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s, transform 0.1s;
        }

        .home-btn:hover { 
            background-color: #444; 
        }
        
        .home-btn:active {
            transform: scale(0.98);
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .navbar { padding: 16px 20px; }
            .nav-logo { font-size: 1.5rem; }
            .nav-links { gap: 16px; }
            .error-card { padding: 40px 30px; }
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="kselis_logo/kselis_logo_nobg_light.png" alt="Kselis Logo" height="32" onerror="this.style.display='none'"> 
            KSELIS
        </a>
        <div class="nav-links">
            <a href="about.html" class="nav-link"><span class="material-symbols-outlined" style="font-size: 18px;">info</span> About</a>
            <a href="contact.html" class="nav-link"><span class="material-symbols-outlined" style="font-size: 18px;">mail</span> Contact</a>
        </div>
    </nav>

    <div class="error-wrapper">
        <div class="error-card">
            <div class="error-code">404</div>
            <div class="error-title">Lost in the void</div>
            <div class="error-text">
                The learning material or page you are looking for has been moved, deleted, or never existed in the first place. Let's get you back to the main portal.
            </div>
            <a href="index.html" class="home-btn">
                <span class="material-symbols-outlined">home</span> 
                Return to Home
            </a>
        </div>
    </div>

</body>
</html>
